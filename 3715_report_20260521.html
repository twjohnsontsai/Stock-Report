      " — 漲跌段都在賣，可能是散戶斷頭、法人減碼或強制平倉。" +
      "</div>";

  phaseExpl += "<div style='font-size:11px;color:#444;background:#fff;border-left:3px solid #e65100;padding:6px 10px;border-radius:0 4px 4px 0;margin-top:6px'>" +
    "📌 <b>操作含義</b>：借券執行帳戶（Q2）由賣轉買 = 借券壓力撤退訊號；底倉帳戶（Q4）近期持續買 = 主力仍在吸籌。兩者同時出現代表底部確立。" +
    "</div></div>";

  document.getElementById("phaseNote").innerHTML = phaseExpl;
})();

// ── 重點分點監控 ─────────────────────────────────────────────
(function() {
  if (!WATCH || WATCH.length === 0) return;
  const card = document.getElementById("watchCard");
  card.style.display = "";
  document.getElementById("watchTitle").textContent =
    "重點分點監控（買進 / 賣出 / 淨超 / 累計）";

  const COLORS = ["#1565c0","#e63946","#2e7d32","#6a1b9a","#e65100","#006064"];

  // 自動偵測離群值：累計範圍 > 其他線中位數 3 倍 → 移到右軸
  const ranges = WATCH.map(w => Math.max(...w.cum) - Math.min(...w.cum));
  const sorted = [...ranges].sort((a,b) => a - b);
  const median = sorted[Math.floor(sorted.length / 2)] || 1;
  const threshold = median * 3;

  const datasets = WATCH.map((w, i) => {
    const isOutlier = ranges[i] > threshold;
    return {
      label: w.name + (isOutlier ? " ▶" : ""),
      data:  w.cum,
      borderColor: COLORS[i % COLORS.length],
      backgroundColor: COLORS[i % COLORS.length] + "18",
      borderWidth: isOutlier ? 1.5 : 2,
      borderDash: isOutlier ? [4, 3] : [],
      pointRadius: 2, tension: 0.2,
      yAxisID: isOutlier ? "y2" : "y",
    };
  });
  const hasOutlier = WATCH.some((w, i) => ranges[i] > threshold);

  new Chart(document.getElementById("watchChart"), {
    type: "line",
    data: { labels: DATES, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: "top", labels: { font: { size: 11 },
        filter: (item) => true } } },
      scales: {
        x:  { ticks: { maxTicksLimit: 20, font: { size: 10 } } },
        y:  { position: "left",  title: { display: true, text: "累計淨買超（張）", font: { size: 10 } } },
        y2: { position: "right", display: hasOutlier,
              title: { display: hasOutlier, text: "▶ 右軸（大量級）", font: { size: 10 } },
              grid: { drawOnChartArea: false } },
      },
    },
  });

  // 表頭：日期 | 分點 × (買/賣/淨)
  const head = document.getElementById("watchHead");
  let hHTML = "<th style='font-size:11px;color:#999'>日期</th>";
  WATCH.forEach(w => {
    const c = w.total >= 0 ? "#1565c0" : "#e63946";
    hHTML += "<th colspan='3' style='text-align:center;color:" + c + ";font-size:11px;border-left:2px solid #eee'>" +
      w.name + "<br><span style='font-weight:400;font-size:10px'>累計 " + w.total + "</span></th>";
  });
  head.innerHTML = hHTML;

  // 表身：最近 20 天，倒序
  const tbody = document.getElementById("watchBody");
  const showN = Math.min(20, DATES.length);
  for (let i = DATES.length - 1; i >= DATES.length - showN; i--) {
    const tr = document.createElement("tr");
    let rHTML = "<td style='font-size:11px;color:#888'>" + DATES[i] + "</td>";
    WATCH.forEach(w => {
      const nc = w.net[i] > 0 ? "#e63946" : w.net[i] < 0 ? "#1565c0" : "#aaa";
      const ns = w.net[i] > 0 ? "+" + w.net[i] : w.net[i];
      rHTML +=
        "<td style='text-align:right;color:#e63946;font-size:11px;border-left:2px solid #f5f5f5'>" + (w.buy[i]  || "") + "</td>" +
        "<td style='text-align:right;color:#888;font-size:11px'>"                                  + (w.sell[i] || "") + "</td>" +
        "<td style='text-align:right;font-weight:500;color:" + nc + ";font-size:11px'>"            + (w.net[i] !== 0 ? ns : "") + "</td>";
    });
    tr.innerHTML = rHTML;
    tbody.appendChild(tr);
  }
  // ── 重點分點說明 ──
  const watchBuyers = (WATCH||[]).filter(w => w.total > 0).sort((a,b) => b.total - a.total);
  const watchSellers = (WATCH||[]).filter(w => w.total < 0).sort((a,b) => a.total - b.total);
  let watchNote =
    "<div style='background:#f9f9f9;border-radius:8px;padding:12px 16px;margin-top:14px'>" +
    "<div style='font-size:11px;font-weight:600;color:#333;margin-bottom:8px'>▌ 這個圖在看什麼</div>" +
    "<div style='font-size:11px;color:#555;line-height:1.8;margin-bottom:8px'>" +
    "追蹤 watchlist.json 裡<b>手動指定的重點分點</b>，顯示他們的<b>累計淨買超走勢</b>（折線圖）和近20日每日明細（表格）。" +
    "正值 = 整段期間淨買入；負值 = 淨賣出。" +
    "折線持續上升 = 該帳戶在吸籌；持續下降 = 在出貨或借券賣出。" +
    "</div>" +
    "<div style='font-size:11px;background:#e3f2fd;border-left:3px solid #1565c0;padding:6px 10px;border-radius:0 4px 4px 0;margin-bottom:8px'>" +
    "🔎 <b>和「四象限分析」有什麼不同？</b><br>" +
    "四象限分析 = 對所有前20大分點做角色分類（誰是借券帳戶？誰在承接？）<br>" +
    "這裡的重點監控 = 只看 watchlist 裡的指定分點，追蹤每天的實際動作。<br>" +
    "兩者互補：先用四象限判斷角色，再用這張表每日確認動向是否符合預期。" +
    "</div>";

  if (watchBuyers.length > 0) {
    watchNote += "<div style='font-size:11px;border-left:3px solid #1565c0;padding:6px 10px;background:#f3f8ff;border-radius:0 4px 4px 0;margin-bottom:6px'>" +
      "📈 <b>累計買超（主力持倉方向）</b>：" +
      watchBuyers.map(w => w.name + " +" + w.total + "張").join("　") + "</div>";
  }
  if (watchSellers.length > 0) {
    watchNote += "<div style='font-size:11px;border-left:3px solid #b71c1c;padding:6px 10px;background:#fff5f5;border-radius:0 4px 4px 0;margin-bottom:6px'>" +
      "📉 <b>累計賣超（打壓 / 借券方向）</b>：" +
      watchSellers.map(w => w.name + " " + w.total + "張").join("　") + "</div>";
  }

  watchNote += "<div style='font-size:11px;color:#444;background:#fff;border-left:3px solid #888;padding:6px 10px;border-radius:0 4px 4px 0;margin-top:4px'>" +
    "📌 <b>怎麼看趨勢</b>：賣超帳戶的折線若在近期「由降轉平或上彎」= 借券壓力收縮；" +
    "買超帳戶若近期加速上揚 = 主力正在加倉。兩者方向同步時為最強訊號。" +
    "</div></div>";

  document.getElementById("watchNote").innerHTML = watchNote;
})();

// ── 籌碼面綜合研判 ───────────────────────────────────────────
(function() {
  document.getElementById("conclusionTitle").textContent = "籌碼面綜合研判";
  const body = document.getElementById("conclusionBody");

  // 1. 換手偵測：買方分點被 ≥2 個賣方分點高度負相關包圍
  const NEG = -0.55, POS = 0.60;
  const buyBrokers  = DS.filter(d =>  d.isBuy).map(d => d.label);
  const sellBrokers = DS.filter(d => !d.isBuy).map(d => d.label);
  let buyerBroker = null, sellerPeers = [];
  buyBrokers.forEach(b => {
    const peers = CORR.filter(c => c.r <= NEG && (c.a === b || c.b === b))
                      .map(c => ({ peer: c.a === b ? c.b : c.a, r: c.r }))
                      .filter(x => sellBrokers.includes(x.peer));
    if (peers.length > sellerPeers.length) { buyerBroker = b; sellerPeers = peers; }
  });
  const handoffDetected = buyerBroker && sellerPeers.length >= 2;
  const spNames = sellerPeers.map(p => p.peer);
  const sameOriginCount = CORR.filter(c => c.r >= POS && spNames.includes(c.a) && spNames.includes(c.b)).length;

  // 2. 買方主力指標
  const bkSk = STREAK.find(s => s.name === buyerBroker) || null;
  const bCost = bkSk?.costBand?.avgCost  || null;
  const bPnl  = bkSk?.costBand?.pnlPct   || null;
  const bBuy  = bkSk?.costBand?.totalBuy || 0;
  const bCurB = bkSk?.curBuy    || 0;
  const bSm   = bkSk?.smartScore || 0;

  // 主力×融資同向性統計
  const buyerCells = bkSk?.cells || [];
  let cBuyFinDown = 0, cBuyFinUp = 0, cSellFinUp = 0, cBuyDays = 0;
  for (let i = 0; i < DATES.length; i++) {
    const bv = buyerCells[i] || 0;
    const fd = MARGIN.fin_diff[i];
    if (fd == null) continue;
    if (bv > 0)                 { cBuyDays++; fd < 0 ? cBuyFinDown++ : cBuyFinUp++; }
    else if (bv < 0 && fd > 0) { cSellFinUp++; }
  }
  const handoffRate = cBuyDays > 0 ? Math.round(cBuyFinDown / cBuyDays * 100) : null;

  // 3. 融資
  const finBals   = MARGIN.fin_bal.filter(v => v != null);
  const latestFin = finBals.length ? finBals[finBals.length - 1] : null;

  // 4. 三大法人累計 + 今日最後一筆
  const sumF = INST.foreign.reduce((a,b) => a+(b||0), 0);
  const sumT = INST.trust.reduce((a,b)   => a+(b||0), 0);
  const sumD = INST.dealer.reduce((a,b)  => a+(b||0), 0);
  const sumI = Math.round(sumF + sumT + sumD);
  const lastNonNull = arr => { for(let i=arr.length-1;i>=0;i--) if(arr[i]!=null) return arr[i]; return 0; };
  const todayF = lastNonNull(INST.foreign);
  const todayT = lastNonNull(INST.trust);
  const todayD = lastNonNull(INST.dealer);
  const todayI = Math.round(todayF + todayT + todayD);

  // 5. 技術位
  const allC    = OHLCV.close.filter(v => v != null);
  const curP    = allC.length ? allC[allC.length - 1] : 0;
  const srtC    = [...allC].sort((a,b) => b-a);
  const periHigh = srtC[0] || 0;
  const pct80C   = srtC[Math.floor(srtC.length * 0.2)] || 0;  // 近期 top-20% 收盤
  const sup1     = bCost ? Math.round(bCost * 100)       / 100 : null;
  const sup2     = bCost ? Math.round(bCost * 0.985 * 100) / 100 : null;
  const res1     = pct80C  > 0 ? Math.round(pct80C  * 100) / 100 : null;
  const res2     = periHigh > 0 ? Math.round(periHigh * 100) / 100 : null;

  // ── 渲染輔助 ──
  function mkSection(bColor, title, rows) {
    const sec = document.createElement("div");
    sec.className = "csec";
    sec.style.borderLeftColor = bColor;
    sec.innerHTML = "<div style='font-size:11px;font-weight:500;color:"+bColor+";margin-bottom:7px'>"+title+"</div>";
    rows.forEach(([lbl, val, vc]) => {
      const d = document.createElement("div");
      d.className = "ckv";
      d.innerHTML = "<span style='color:#666'>"+lbl+"</span>"+
                    "<span style='font-weight:500;color:"+(vc||"#333")+"'>"+val+"</span>";
      sec.appendChild(d);
    });
    body.appendChild(sec);
  }

  function mkPriceRow(items) {
    const wrap = document.createElement("div");
    wrap.style.cssText = "display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px";
    items.forEach(([lbl, val, c, bg]) => {
      if (val == null) return;
      const d = document.createElement("div");
      d.className = "cpbox";
      d.style.background = bg || "#f5f7ff";
      d.innerHTML = "<div style='font-size:10px;color:#888;margin-bottom:2px'>"+lbl+"</div>"+
                    "<div style='font-size:17px;font-weight:500;color:"+c+";font-variant-numeric:tabular-nums'>"+
                    val.toFixed(2)+"</div><div style='font-size:10px;color:#aaa'>元</div>";
      wrap.appendChild(d);
    });
    body.appendChild(wrap);
  }

  // ── 換手結構 ──
  if (handoffDetected) {
    const spList = sellerPeers.sort((a,b) => a.r-b.r)
                    .map(p => p.peer+"(r="+p.r.toFixed(2)+")").join("、");
    mkSection("#1565c0", "▌ 換手結構分析（偵測到協同換手）", [
      ["換手型態",   sellerPeers.length+" 家協同分點賣出 → "+buyerBroker+" 承接",           "#0d47a1"],
      ["賣方分點",   spList.length > 64 ? spList.slice(0,64)+"…" : spList,                  "#546e7a"],
      ["賣方同源",   sameOriginCount > 0 ? sameOriginCount+" 對 r≥+0.6（疑同主力多通道）" : "未偵測到同源對",
                    sameOriginCount > 0 ? "#e65100" : "#888"],
      ["強度比說明", "強度比＜50% 為換手雙腳計算假象，非控盤減弱訊號",                     "#999"],
    ]);
  } else {
    mkSection("#9e9e9e", "▌ 換手結構分析", [
      ["偵測結果", "未偵測到明顯換手結構（分點獨立操作）", "#666"],
    ]);
  }

  // ── 籌碼現況 ──
  const chipRows = [];
  if (bCost) {
    chipRows.push(["主力均成本（"+(buyerBroker||"買方")+"）",
      bCost.toFixed(2)+" 元　浮盈 "+(bPnl >= 0 ? "+" : "")+bPnl.toFixed(2)+"%",
      bPnl >= 0 ? "#1b5e20" : "#c62828"]);
    chipRows.push(["累計買超 / 聰明錢",
      bBuy.toFixed(0)+" 張　/ 　"+bSm.toFixed(1)+"%",
      bSm >= 60 ? "#0d47a1" : "#546e7a"]);
    if (handoffRate != null) {
      const hrC = handoffRate >= 60 ? "#1b5e20" : handoffRate >= 40 ? "#e65100" : "#c62828";
      const hrL = handoffRate >= 60 ? "籌碼轉換確認 ✓" :
                  handoffRate >= 40 ? "部分換手" : "換手跡象不明";
      chipRows.push(["  ↳ 買超日同時融資減少（換手確認率）",
        handoffRate+"% （"+cBuyFinDown+"/"+cBuyDays+" 日）　"+hrL, hrC]);
    }
    if (cSellFinUp > 0) {
      chipRows.push(["  ↳ 主力賣超＋融資增加（出貨警訊日）",
        cSellFinUp+" 日",
        cSellFinUp >= 3 ? "#c62828" : "#e65100"]);
    }
  }
  if (latestFin != null) {
    chipRows.push(["融資餘額（散戶壓力）",
      latestFin.toLocaleString()+" 張",
      latestFin > 20000 ? "#c62828" : "#e65100"]);
  }
  const instSign = sumI >= 0 ? "+" : "";
  chipRows.push([META.days+"日三大法人淨",
    instSign+sumI.toLocaleString()+" 張（外資 "+(sumF>=0?"+":"")+Math.round(sumF).toLocaleString()+"）",
    sumI >= 0 ? "#1565c0" : sumI >= -5000 ? "#e65100" : "#c62828"]);
  mkSection("#2e7d32", "▌ 籌碼現況", chipRows);

  // ── 支撐 / 壓力位 ──
  const priceLabel = document.createElement("div");
  priceLabel.style.cssText = "font-size:11px;font-weight:500;color:#546e7a;margin-bottom:8px";
  priceLabel.textContent = "▌ 技術位（支撐 / 壓力）";
  body.appendChild(priceLabel);
  mkPriceRow([
    ["強支撐",          sup2,              "#1565c0", "#eef2ff"],
    ["主力成本（支撐）", sup1,             "#1976d2", "#e8f0fe"],
    ["現價",            curP > 0 ? curP : null, "#37474f", "#f5f5f5"],
    ["壓力一",          res1,              "#e65100", "#fff3e0"],
    ["壓力二（近高）",  res2,              "#c62828", "#fff0f0"],
  ]);

  // ── 操作研判 ──
  let concText = "", concColor = "#333";
  if (handoffDetected) {
    const profitNote = bPnl != null
      ? (Math.abs(bPnl) <= 5 ? "主力成本區間安全（浮盈"+(bPnl>=0?"+":"")+bPnl.toFixed(1)+"%），護盤動機存在。" : "")
      : "";
    const finNote = latestFin
      ? "融資餘額 "+latestFin.toLocaleString()+" 張構成頭部壓力，突破壓力前留意解套賣壓。"
      : "";
    const todayISign = todayI >= 0 ? "+" : "";
    const instNote = todayI > 300
      ? "三大法人今日買超 "+todayISign+todayI.toLocaleString()+" 張，短線籌碼支撐。"
      : todayI < -300
      ? "三大法人今日賣超 "+todayI.toLocaleString()+" 張（"+META.days+"日累計 "+(sumI>=0?"+":"")+sumI.toLocaleString()+"），需持續追蹤。"
      : Math.abs(sumI) < 5000
      ? "三大法人今日小幅動作，帳面流出為換手結構所致，非實際退場。"
      : sumI > 0 ? "三大法人"+META.days+"日累計買超，籌碼面支撐良好。"
      : "三大法人今日小幅動作，"+META.days+"日累計淨賣 "+Math.abs(sumI).toLocaleString()+" 張，持續觀察。";
    const confirmNote = handoffRate != null
      ? "換手確認率 "+handoffRate+"%（主力買超日中融資同步縮減）。"
      : "";
    concText = "換手完成、籌碼改善。"+confirmNote+profitNote+finNote+instNote+"等待催化劑配合，可能啟動主升段。";
    concColor = "#1b5e20";
  } else {
    const g = COMPOSITE.total;
    concText = "未偵測換手結構，依綜合評分 "+g+" 分（"+COMPOSITE.grade+"）研判："+
      (g >= 65 ? "籌碼面偏多，持續關注主力分點動向。" :
       g >= 50 ? "籌碼面中性，觀望待突破訊號。" : "籌碼面偏弱，宜減碼審慎應對。");
    concColor = COMPOSITE.color;
  }
  const opDiv = document.createElement("div");
  opDiv.style.cssText = "border-left:3px solid "+concColor+";padding:12px 16px;background:"+concColor+"12;border-radius:0 8px 8px 0;margin-bottom:10px";
  opDiv.innerHTML = "<div style='font-size:11px;font-weight:500;color:"+concColor+";margin-bottom:5px'>▌ 操作研判</div>"+
                    "<div style='font-size:13px;line-height:1.8;color:#333'>"+concText+"</div>";
  body.appendChild(opDiv);

  const disc = document.createElement("div");
  disc.style.cssText = "font-size:10px;color:#bbb;margin-top:8px;line-height:1.6";
  disc.textContent = "★ 以上由系統依籌碼數據自動生成，僅供輔助研判，不構成投資建議。請搭配大盤環境、基本面與個人風控評估後操作。";
  body.appendChild(disc);
})();

(function() {
  const tbl = document.getElementById("heatTable");
  const allVals = STREAK.flatMap(s => s.cells.map(Math.abs)).filter(v => v > 0);
  const maxV = allVals.length ? Math.max(...allVals) : 1;

  // 日期標題列
  const hdr = tbl.insertRow();
  const corner = hdr.insertCell();
  corner.style.cssText = "min-width:90px;position:sticky;left:0;background:#fff;z-index:3";
  DATES.forEach(d => {
    const th = document.createElement("th");
    th.textContent = d.slice(5);
    th.style.cssText = "font-size:9px;color:#999;width:22px;padding:0 1px;text-align:center;font-weight:400";
    hdr.appendChild(th);
  });

  STREAK.forEach(s => {
    const row = tbl.insertRow();
    const nc = row.insertCell();
    nc.style.cssText = "font-size:11px;padding:1px 8px 1px 4px;text-align:right;white-space:nowrap;position:sticky;left:0;background:#fff;z-index:2";
    nc.textContent = s.name;
    s.cells.forEach((v, i) => {
      const td = row.insertCell();
      td.style.cssText = "width:22px;height:20px;border-radius:3px;cursor:default";
      if (v > 0) {
        const a = 0.15 + 0.75 * (v / maxV);
        td.style.background = "rgba(21,101,192," + a.toFixed(2) + ")";
      } else if (v < 0) {
        const a = 0.15 + 0.75 * (Math.abs(v) / maxV);
        td.style.background = "rgba(230,57,70," + a.toFixed(2) + ")";
      } else {
        td.style.background = "rgba(220,220,220,0.35)";
      }
      td.title = s.name + "  " + DATES[i] + "：" + (v > 0 ? "+" : "") + v.toFixed(1) + " 張";
    });
  });
})();

function rColor(r) {
  if (r == null) return "#ccc";
  if (r >=  0.5) return "#0d47a1";
  if (r >=  0.3) return "#1976d2";
  if (r <= -0.5) return "#b71c1c";
  if (r <= -0.3) return "#e53935";

}
function rFmt(r) {
  if (r == null) return "—";
  return (r >= 0 ? "+" : "") + r.toFixed(2);

function smLabel(score) {
  if (score >= 70) return ["聰明錢 ★★★", "#0d47a1"];

  if (score >= 30) return ["混合型 ★",    "#546e7a"];

}

const intensityBaseline = {
  id: "intensityBaseline",
  afterDraw(chart) {
    const {ctx, scales:{yRatio}} = chart;
    if (!yRatio) return;
    const y50 = yRatio.getPixelForValue(50);
    ctx.save();
    ctx.strokeStyle = "rgba(120,120,120,0.4)";
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(chart.chartArea.left, y50);
    ctx.lineTo(chart.chartArea.right, y50);
    ctx.stroke();
    ctx.restore();
  }
};

// ── K 線 × 分點累積疊圖 ──────────────────────────────────────
(function() {
  document.getElementById("overlayTitle").textContent =
    "股價走勢 × 追蹤分點累積淨買賣超";

  // 累積淨買賣超（全部 STREAK 分點）
  const cumBroker = [];
  let cum = 0;
  for (let i = 0; i < DATES.length; i++) {
    let daily = 0;
    STREAK.forEach(s => { daily += (s.cells[i] || 0); });
    cum += daily;
    cumBroker.push(+cum.toFixed(1));
  }

  // 逐日漲跌著色插件
  const dayColor = {
    id: "dayColor",
    beforeDraw(chart) {
      const {ctx, chartArea:{left,right,top,bottom}, scales:{x}} = chart;
      if (!x) return;
      ctx.save();
      DATES.forEach((_, i) => {
        const o = OHLCV.open[i], c = OHLCV.close[i];
        if (o == null || c == null) return;
        const x0 = i === 0 ? left : (x.getPixelForValue(i-1) + x.getPixelForValue(i)) / 2;
        const x1 = i === DATES.length-1 ? right : (x.getPixelForValue(i) + x.getPixelForValue(i+1)) / 2;
        ctx.fillStyle = c >= o ? "rgba(200,230,200,0.18)" : "rgba(255,200,200,0.18)";
        ctx.fillRect(x0, top, x1-x0, bottom-top);
      });
      ctx.restore();
    }
  };

  new Chart(document.getElementById("overlayChart"), {
    type: "line",
    data: {
      labels: DATES,
      datasets: [
        {
          label: "收盤價（元）",
          data: OHLCV.close,
          borderColor: "#37474f",
          backgroundColor: "rgba(0,0,0,0)",
          tension: 0.2,
          pointRadius: 2,
          pointHoverRadius: 5,
          borderWidth: 2,
          yAxisID: "yPrice",
        },
        {
          label: "分點累積淨買超（張）",
          data: cumBroker,
          borderColor: "#1565c0",
          backgroundColor: "rgba(21,101,192,0.10)",
          fill: true,
          tension: 0.3,
          pointRadius: 0,
          pointHoverRadius: 4,
          borderWidth: 2,
          yAxisID: "yCum",
        }
      ]
    },
    plugins: [dayColor],
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { position: "top", labels: { font:{size:10}, boxWidth:10, padding:8 } },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (ctx.datasetIndex === 0) return "收盤：" + ctx.raw + " 元";
              return "累積淨買：" + (ctx.raw >= 0 ? "+" : "") + ctx.raw + " 張";
            }
          }
        }
      },
      scales: {
        x: { ticks:{ font:{size:10}, maxRotation:45 }, grid:{ color:"#f0f0f0" } },
        yPrice: {
          position: "left",
          ticks: { font:{size:10}, callback: v => v + " 元" },
          grid: { color:"#f0f0f0" },
          title: { display:true, text:"收盤價（元）", font:{size:11} }
        },
        yCum: {
          position: "right",
          ticks: { font:{size:10}, callback: v => (v>=0?"+":"")+v+" 張" },
          grid: { drawOnChartArea:false },
          title: { display:true, text:"累積淨買賣超（張）", font:{size:11} }
        }
      }
    }
  });
  // ── 斜率分析（不做四象限機械判斷）──
  const latestCum   = cumBroker[cumBroker.length - 1] || 0;
  const cum20ago    = cumBroker[Math.max(0, cumBroker.length - 21)] || 0;
  const cum5ago     = cumBroker[Math.max(0, cumBroker.length - 6)]  || 0;
  const cum3ago     = cumBroker[Math.max(0, cumBroker.length - 4)]  || 0;
  const trend20     = Math.round(latestCum - cum20ago);
  const trend5      = Math.round(latestCum - cum5ago);
  const trend3      = Math.round(latestCum - cum3ago);

  // 斜率放緩：近5日 vs 近20日日均值比較
  const daily20avg  = trend20 / 20;
  const daily5avg   = trend5  / 5;
  const daily3avg   = trend3  / 3;

  // 近5日斜率是否好轉（賣壓減輕 or 轉買）
  let slopeNote = "", slopeColor = "#555", slopeBg = "#f9f9f9";
  if (trend5 > 0) {
    slopeNote = "近5日藍線轉升（+" + trend5 + " 張）→ 賣壓明顯減輕，追蹤分點整體轉為淨買入。";
    slopeColor = "#1b5e20"; slopeBg = "#e8f5e9";
  } else if (trend5 > daily20avg * 5 * 0.5 && trend5 < 0) {
    slopeNote = "近5日賣壓大幅收縮（日均 " + Math.round(daily5avg) + " 張，較前20日均值 " + Math.round(daily20avg) + " 張明顯改善）→ 打壓力道減弱。";
    slopeColor = "#e65100"; slopeBg = "#fff8f4";
  } else if (trend5 < 0 && daily3avg > daily5avg * 0.5) {
    slopeNote = "近5日賣壓仍重（日均 " + Math.round(daily5avg) + " 張），但近3日已顯著收縮（日均 " + Math.round(daily3avg) + " 張）→ 打壓力道出現鬆動跡象，觀察能否持續。";
    slopeColor = "#e65100"; slopeBg = "#fff8f4";
  } else {
    slopeNote = "近5日賣壓持續（日均 " + Math.round(daily5avg) + " 張），近3日（日均 " + Math.round(daily3avg) + " 張）尚未見明顯收縮。";
    slopeColor = "#b71c1c"; slopeBg = "#fff5f5";
  }

  const noteHTML =
    "<div style='background:#f9f9f9;border-radius:8px;padding:12px 16px;margin-top:10px'>" +
    "<div style='font-size:11px;font-weight:600;color:#333;margin-bottom:8px'>▌ 這個圖在看什麼</div>" +
    "<div style='font-size:11px;color:#555;line-height:1.8;margin-bottom:8px'>" +
    "黑線 = 股價；藍線 = 所有被追蹤分點的<b>累計淨買超合計</b>（正 = 買多於賣；負 = 賣多於買）。" +
    "背景綠色 = 當日收漲；紅色 = 當日收跌。" +
    "</div>" +
    "<div style='font-size:11px;background:#fff3e0;border-left:3px solid #e65100;padding:6px 10px;border-radius:0 4px 4px 0;margin-bottom:8px'>" +
    "⚠️ <b>限制</b>：藍線包含所有追蹤分點（含大量借券賣方）。若賣方分點規模遠大於買方，藍線會長期為負，" +
    "此時看<b>絕對方向</b>（漲跌）沒有意義。應看<b>斜率是否在收斂</b>（賣壓日均減少、藍線止跌）。" +
    "</div>" +
    "<div style='font-size:11px;color:#555;line-height:1.8;margin-bottom:8px'>" +
    "📊 <b>數據</b>：目前累計 " + (latestCum >= 0 ? "+" : "") + latestCum + " 張" +
    "　｜　近20日變化：" + (trend20 >= 0 ? "+" : "") + trend20 + " 張（日均 " + Math.round(daily20avg) + "）" +
    "　｜　近5日變化：" + (trend5 >= 0 ? "+" : "") + trend5 + " 張（日均 " + Math.round(daily5avg) + "）" +
    "　｜　近3日變化：" + (trend3 >= 0 ? "+" : "") + trend3 + " 張" +
    "</div>" +
    "<div style='background:" + slopeBg + ";border-left:3px solid " + slopeColor + ";padding:8px 12px;border-radius:0 6px 6px 0;font-size:11px'>" +
    "📌 <b>斜率研判</b>：" + slopeNote +
    "</div></div>";

  document.getElementById("overlayNote").innerHTML = noteHTML;
})();

// ── Legend：買超大→小，賣超大→小（張數絕對值）────────────
const leg = document.getElementById("leg");
const buyDs  = DS.filter(d => d.isBuy);   // 已按買超大→小
const sellDs = DS.filter(d => !d.isBuy);  // 已按賣超大→小（最負在前）

function makeLegItem(d, rank, container) {
  const wrap = document.createElement("span");
  wrap.className = "leg-item";
  const line = document.createElement("span");
  line.style.cssText = d.borderDash.length
    ? "display:inline-block;width:18px;height:0;border-top:2px dashed "+d.borderColor+";vertical-align:middle;flex-shrink:0"
    : "display:inline-block;width:18px;height:3px;background:"+d.borderColor+";border-radius:2px;vertical-align:middle;flex-shrink:0";
  const txt = document.createElement("span");
  txt.textContent = rank + ". " + d.label;
  wrap.appendChild(line);
  wrap.appendChild(txt);
  container.appendChild(wrap);
}

// 買超區
const buyHdr = document.createElement("div");
buyHdr.style.cssText = "width:100%;font-size:11px;color:#1565c0;font-weight:500;margin:4px 0 4px;border-bottom:1px solid #e0e8ff;padding-bottom:2px";
buyHdr.textContent = "▲ 買超前" + META.topN + "名（每日曲線）";
leg.appendChild(buyHdr);
buyDs.forEach((d, i) => makeLegItem(d, i+1, leg));

// 賣超區
const sellHdr = document.createElement("div");
sellHdr.style.cssText = "width:100%;font-size:11px;color:#e63946;font-weight:500;margin:8px 0 4px;border-bottom:1px solid #ffe0e0;padding-bottom:2px";
sellHdr.textContent = "▼ 賣超前" + META.topN + "名（每日曲線）";
leg.appendChild(sellHdr);
sellDs.forEach((d, i) => makeLegItem(d, i+1, leg));

// ── 排行榜 ─────────────────────────────────────────────────
function renderRank(data, tbodyId, color) {
  const tbody = document.getElementById(tbodyId);
  data.forEach((row, i) => {
    const tr = document.createElement("tr");
    const sign = row.val >= 0 ? "+" : "";
    tr.innerHTML =
      "<td style='color:#999'>"+(i+1)+"</td>" +
      "<td>"+row.name+"</td>" +
      "<td style='text-align:right;color:"+color+";font-variant-numeric:tabular-nums'>"+
        sign+row.val.toLocaleString()+"</td>";
    tbody.appendChild(tr);
  });
}
renderRank(BUY_R,  "buyRows",  "#1565c0");
renderRank(SELL_R, "sellRows", "#e63946");

// ── 相關係數表 ──────────────────────────────────────────────
const corrTbody = document.getElementById("corrRows");
CORR.forEach(row => {
  const tr = document.createElement("tr");
  const sign = row.r >= 0 ? "+" : "";
  tr.innerHTML =
    "<td>"+row.a+"</td><td>"+row.b+"</td>" +
    "<td style='text-align:right'>"+sign+row.r.toFixed(2)+"</td>" +
    "<td><span class='badge' style='background:"+row.color+"22;color:"+row.color+"'>"+row.label+"</span></td>";
  corrTbody.appendChild(tr);
});

// ── Chart.js ────────────────────────────────────────────────
const chartDs = DS.map(d => ({
  label:           d.label,
  data:            d.data,
  borderColor:     d.borderColor,
  backgroundColor: d.bgColor,
  pointRadius:     d.pointRadius,
  pointHoverRadius:7,
  borderWidth:     d.borderWidth,
  borderDash:      d.borderDash,
  tension:         0.3,
  spanGaps:        false,
}));

const zeroLine = {
  id: "zeroLine",
  afterDraw(chart) {
    const {ctx, scales:{y}} = chart;
    const y0 = y.getPixelForValue(0);
    ctx.save();
    ctx.strokeStyle = "rgba(0,0,0,0.15)";
    ctx.lineWidth = 1;
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.moveTo(chart.chartArea.left, y0);
    ctx.lineTo(chart.chartArea.right, y0);
    ctx.stroke();
    ctx.restore();
  }
};

const xhair = {
  id: 'xhair',
  afterDraw(chart) {
    if (!chart.tooltip._active?.length) return;
    const {ctx, chartArea:{top,bottom}} = chart;
    const x = chart.tooltip._active[0].element.x;
    ctx.save();
    ctx.beginPath(); ctx.moveTo(x,top); ctx.lineTo(x,bottom);
    ctx.strokeStyle='rgba(180,210,255,0.35)'; ctx.lineWidth=1;
    ctx.setLineDash([4,3]); ctx.stroke(); ctx.restore();
  }
};

new Chart(document.getElementById("mainChart"), {
  type: "line",
  data: { labels: DATES, datasets: chartDs },
  plugins: [zeroLine, xhair],
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode:"index", intersect:false },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          title: ctx => ctx[0].label,
          label: ctx => {
            if (ctx.raw === null || ctx.raw === 0) return null;
            const sign = ctx.raw > 0 ? "+" : "";
            return ctx.dataset.label + "：" + sign + ctx.raw.toLocaleString() + " 張";
          },
          // 排序：買超（正值大→小）先，賣超（負值小→大）後
          afterBody: () => [],
        },
        itemSort: (a, b) => b.raw - a.raw,
        filter: item => item.raw !== null && item.raw !== 0,
      }
    },
    scales: {
      x: { ticks:{ font:{size:11}, maxRotation:45 }, grid:{ color:"#f0f0f0" } },
      y: {
        ticks:{ font:{size:11}, callback: v=>(v>0?"+":"")+v.toLocaleString() },
        grid:{ color:"#f0f0f0" },
        title:{ display:true, text:"淨買賣超（張）", font:{size:12} }
      }
    }
  }
});
</script>
</body>
</html>
