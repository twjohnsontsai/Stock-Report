// ── 四象限 × 底部行為整合研判 ────────────────────────────────
(function() {
  if (!PHASE || PHASE.length === 0 || !WAVE || !WAVE.bottom || !WAVE.bottom.date) return;
  const card = document.getElementById("crossCard");
  card.style.display = "";
  document.getElementById("crossTitle").textContent = "四象限 × 底部行為整合研判";

  const qLabel = {1:"Q1 協同多頭", 2:"Q2 借券/換手", 3:"Q3 持續賣出", 4:"Q4 底倉承接"};
  const qColor = {1:"#2e7d32",      2:"#e65100",       3:"#6a1b9a",      4:"#1565c0"};

  // 建立各階段淨超查找表
  const phaseLookup = {};
  (WAVE.phases || []).forEach(ph => {
    (ph.brokers || []).forEach(b => {
      if (!phaseLookup[b.name]) phaseLookup[b.name] = {};
      phaseLookup[b.name][ph.key] = b.net;
    });
  });

  // 建立四象限查找表
  const qMap = {};
  PHASE.forEach(p => { qMap[p.name] = p; });

  // 合併：出現在 PHASE 或 WAVE.phases 裡的所有券商
  const allNames = new Set([
    ...PHASE.map(p => p.name),
    ...Object.keys(phaseLookup)
  ]);

  const rows = [];
  allNames.forEach(name => {
    const q   = qMap[name];
    const ph  = phaseLookup[name] || {};
    const pre = ph["pre"]    ?? null;
    const ely = ph["early"]  ?? null;
    const rec = ph["recent"] ?? null;
    if (q == null && pre == null && ely == null && rec == null) return;
    rows.push({ name, q, pre, ely, rec });
  });

  // 排序：Q4 → Q1 → Q2 → Q3 → 無分類
  const qOrder = {4:0, 1:1, 2:2, 3:3};
  rows.sort((a, b) => {
    const oa = a.q ? (qOrder[a.q.q] ?? 9) : 9;
    const ob = b.q ? (qOrder[b.q.q] ?? 9) : 9;
    return oa !== ob ? oa - ob : (b.q?.cum ?? 0) - (a.q?.cum ?? 0);
  });

  // 自動研判邏輯
  function judge(q, pre, ely, rec) {
    const qn = q?.q;
    const msgs = [];
    if (qn === 4) {
      if (pre != null && pre > 50)  msgs.push("底前建倉");
      if (ely != null && ely < -50) msgs.push("底後出貨（解套）");
      if (ely != null && ely > 50)  msgs.push("底後加碼");
      if (rec != null && rec > 20)  msgs.push("近期仍買");
      if (rec != null && rec < -50) msgs.push("近期轉賣 ⚠️");
    } else if (qn === 2) {
      if (pre != null && pre < -100) msgs.push("底前借券打壓");
      if (ely != null && ely > 100)  msgs.push("底後大量回補");
      if (ely != null && ely < -100) msgs.push("底後持續賣出");
      if (rec != null && rec < -50)  msgs.push("近期再次做空 ⚠️");
      if (rec != null && rec > 50)   msgs.push("近期轉買（借券收斂）");
    } else if (qn === 3) {
      if (rec != null && rec > 30) msgs.push("近期翻轉買入 🔄");
      else msgs.push("持續賣壓");
    }
    if (msgs.length === 0 && q != null) msgs.push(qLabel[qn] || "—");
    return msgs.join(" → ");
  }

  function netCell(v) {
    if (v == null) return "<td style='text-align:right;color:#ccc'>—</td>";
    const c = v > 0 ? "#1b5e20" : v < 0 ? "#b71c1c" : "#888";
    const s = v > 0 ? "+" : "";
    return `<td style='text-align:right;color:${c};font-variant-numeric:tabular-nums;font-weight:${Math.abs(v)>200?"600":"400"}'>${s}${v}</td>`;
  }

  // 取各階段天數標籤
  const phaseLabels = {};
  (WAVE.phases || []).forEach(ph => { phaseLabels[ph.key] = ph.label + "(" + ph.days + "日)"; });

  let tbl = `<table style="border-collapse:collapse;font-size:12px;width:100%">
    <thead><tr style="background:#f5f5f5;font-size:11px">
      <th style="padding:5px 10px;border:1px solid #ddd;text-align:left">分點</th>
      <th style="padding:5px 8px;border:1px solid #ddd;text-align:center">近${META.phaseDays}日角色</th>
      <th style="padding:5px 8px;border:1px solid #ddd;text-align:right">${phaseLabels["pre"] || "底前"}</th>
      <th style="padding:5px 8px;border:1px solid #ddd;text-align:right">${phaseLabels["early"] || "底後早段"}</th>
      <th style="padding:5px 8px;border:1px solid #ddd;text-align:right">${phaseLabels["recent"] || "近期"}</th>
      <th style="padding:5px 8px;border:1px solid #ddd;text-align:left">研判</th>
    </tr></thead><tbody>`;

  const summaryLines = { "Q4 底倉承接": [], "Q2 借券/換手": [], "Q3 持續賣出": [], "其他": [] };

  rows.forEach(r => {
    const qn   = r.q?.q;
    const qC   = qn ? qColor[qn] : "#888";
    const qTxt = qn ? qLabel[qn] : "未分類";
    const jTxt = judge(r.q, r.pre, r.ely, r.rec);
    const rowBg = qn === 4 ? "#f0f7ff" : qn === 2 ? "#fff8f0" : qn === 3 ? "#fdf4ff" : "";

    tbl += `<tr style="border-bottom:1px solid #eee;background:${rowBg}">
      <td style="padding:4px 10px;border:1px solid #eee;font-weight:500">${r.name}${r.q?.isWatch ? " ★" : ""}</td>
      <td style="padding:4px 8px;border:1px solid #eee;text-align:center">
        <span style="font-size:11px;color:${qC};font-weight:600">${qTxt}</span></td>
      ${netCell(r.pre)}${netCell(r.ely)}${netCell(r.rec)}
      <td style="padding:4px 8px;border:1px solid #eee;font-size:11px;color:#444">${jTxt}</td>
    </tr>`;

    // 收集摘要
    const key = qn === 4 ? "Q4 底倉承接" : qn === 2 ? "Q2 借券/換手" : qn === 3 ? "Q3 持續賣出" : "其他";
    summaryLines[key].push(r.name + (jTxt ? "（" + jTxt + "）" : ""));
  });

  // 合計行
  function sumCol(key) {
    const vals = rows.map(r => r[key]).filter(v => v != null);
    return vals.length ? vals.reduce((a, b) => a + b, 0) : null;
  }
  const totPre = sumCol("pre"), totEly = sumCol("ely"), totRec = sumCol("rec");
  function totCell(v) {
    if (v == null) return "<td style='border:1px solid #ddd'></td>";
    const c = v > 0 ? "#1b5e20" : v < 0 ? "#b71c1c" : "#888";
    return `<td style='text-align:right;padding:4px 8px;border:1px solid #ddd;color:${c};font-weight:700;font-size:12px'>${v > 0 ? "+" : ""}${v}</td>`;
  }
  tbl += `<tr style="background:#f0f0f0;border-top:2px solid #bbb">
    <td colspan="2" style="padding:4px 10px;border:1px solid #ddd;text-align:right;font-weight:600;font-size:11px;color:#555">全體合計淨超</td>
    ${totCell(totPre)}${totCell(totEly)}${totCell(totRec)}
    <td style="border:1px solid #eee"></td>
  </tr>`;
  tbl += "</tbody></table>";
  document.getElementById("crossTableWrap").innerHTML = tbl;

  // 摘要段落
  let sumHtml = "";
  if (summaryLines["Q4 底倉承接"].length)
    sumHtml += `<div style="margin-bottom:8px;font-size:12px;line-height:1.8">
      <span style="color:#1565c0;font-weight:600">▶ 底倉承接（Q4）：</span>${summaryLines["Q4 底倉承接"].join("；")}</div>`;
  if (summaryLines["Q2 借券/換手"].length)
    sumHtml += `<div style="margin-bottom:8px;font-size:12px;line-height:1.8">
      <span style="color:#e65100;font-weight:600">▶ 借券/換手（Q2）：</span>${summaryLines["Q2 借券/換手"].join("；")}</div>`;
  if (summaryLines["Q3 持續賣出"].length)
    sumHtml += `<div style="margin-bottom:8px;font-size:12px;line-height:1.8">
      <span style="color:#6a1b9a;font-weight:600">▶ 持續賣出（Q3）：</span>${summaryLines["Q3 持續賣出"].join("；")}</div>`;
  document.getElementById("crossSummary").innerHTML = sumHtml;
})();

// ── 籌碼面綜合研判 ───────────────────────────────────────────
(function() {
  document.getElementById("conclusionTitle").textContent = "籌碼面綜合研判";
  const body = document.getElementById("conclusionBody");

  // 1. 換手偵測：雙向檢測（集團化資料模式）
  // 集團化後日淨超平滑，換手信號通常表現為：
  //   A. 某賣方被 ≥2 個買方負相關（賣方向多買方分配）
  //   B. 某買方被 ≥2 個賣方負相關（買方從多賣方承接）
  const NEG = -0.35, POS = 0.45;
  const buyBrokers  = DS.filter(d =>  d.isBuy).map(d => d.label);
  const sellBrokers = DS.filter(d => !d.isBuy).map(d => d.label);
  let buyerBroker = null, sellerPeers = [];
  let sellerBroker = null, buyerPeers = [];

  // 模式 A：找賣方與最多買方負相關（主動分配型換手）
  sellBrokers.forEach(s => {
    const peers = CORR.filter(c => c.r <= NEG && (c.a === s || c.b === s))
                      .map(c => ({ peer: c.a === s ? c.b : c.a, r: c.r }))
                      .filter(x => buyBrokers.includes(x.peer));
    if (peers.length > buyerPeers.length) { sellerBroker = s; buyerPeers = peers; }
  });

  // 模式 B：找買方與最多賣方負相關（主動承接型換手）
  buyBrokers.forEach(b => {
    const peers = CORR.filter(c => c.r <= NEG && (c.a === b || c.b === b))
                      .map(c => ({ peer: c.a === b ? c.b : c.a, r: c.r }))
                      .filter(x => sellBrokers.includes(x.peer));
    if (peers.length > sellerPeers.length) { buyerBroker = b; sellerPeers = peers; }
  });

  // 取信號最強的模式
  const modeA = sellerBroker && buyerPeers.length >= 2;
  const modeB = buyerBroker  && sellerPeers.length >= 2;
  const handoffDetected = modeA || modeB;
  const usesModeA = modeA && (!modeB || buyerPeers.length > sellerPeers.length);

  // 籌碼現況用的買方代表：modeA 取買方中累計買超最大者；modeB 直接用 buyerBroker
  const costBroker = usesModeA
    ? (buyerPeers.slice().sort((a, b) => {
        const sa = STREAK.find(s => s.name === a.peer);
        const sb = STREAK.find(s => s.name === b.peer);
        return (sb?.costBand?.totalBuy || 0) - (sa?.costBand?.totalBuy || 0);
      })[0]?.peer || buyerPeers[0]?.peer)
    : buyerBroker;

  // sameOriginCount：檢查對手方是否同源（modeA=多買方是否同源；modeB=多賣方是否同源）
  const spNames = usesModeA ? buyerPeers.map(p => p.peer) : sellerPeers.map(p => p.peer);
  const sameOriginCount = CORR.filter(c => c.r >= POS && spNames.includes(c.a) && spNames.includes(c.b)).length;

  // 2. 買方主力指標
  const bkSk = STREAK.find(s => s.name === costBroker) || null;
  const bCost = bkSk?.costBand?.avgCost  || null;
  const bPnl  = bkSk?.costBand?.pnlPct   || null;
  const bBuy  = bkSk?.costBand?.totalBuy || 0;
  const bCurB = bkSk?.curBuy    || 0;
  const bSm   = bkSk?.smartScore || 0;

  // 主力×融資同向性統計
  const buyerCells = bkSk?.cells || [];
  let cBuyFinDown = 0, cBuyFinUp = 0, cSellFinUp = 0, cBuyDays = 0;
  for (let i = 0; i < DATES.length; i++) {
    const bv = buyerCells[i] || 0;
    const fd = MARGIN.fin_diff[i];
    if (fd == null) continue;
    if (bv > 0)                 { cBuyDays++; fd < 0 ? cBuyFinDown++ : cBuyFinUp++; }
    else if (bv < 0 && fd > 0) { cSellFinUp++; }
  }
  const handoffRate = cBuyDays > 0 ? Math.round(cBuyFinDown / cBuyDays * 100) : null;

  // 3. 融資
  const finBals   = MARGIN.fin_bal.filter(v => v != null);
  const latestFin = finBals.length ? finBals[finBals.length - 1] : null;

  // 4. 三大法人累計 + 今日最後一筆
  const sumF = INST.foreign.reduce((a,b) => a+(b||0), 0);
  const sumT = INST.trust.reduce((a,b)   => a+(b||0), 0);
  const sumD = INST.dealer.reduce((a,b)  => a+(b||0), 0);
  const sumI = Math.round(sumF + sumT + sumD);
  const lastNonNull = arr => { for(let i=arr.length-1;i>=0;i--) if(arr[i]!=null) return arr[i]; return 0; };
  const todayF = lastNonNull(INST.foreign);
  const todayT = lastNonNull(INST.trust);
  const todayD = lastNonNull(INST.dealer);
  const todayI = Math.round(todayF + todayT + todayD);

  // 5. 技術位
  const allC    = OHLCV.close.filter(v => v != null);
  const curP    = allC.length ? allC[allC.length - 1] : 0;
  const srtC    = [...allC].sort((a,b) => b-a);
  const periHigh = srtC[0] || 0;
  const pct80C   = srtC[Math.floor(srtC.length * 0.2)] || 0;  // 近期 top-20% 收盤
  const sup1     = bCost ? Math.round(bCost * 100)       / 100 : null;
  const sup2     = bCost ? Math.round(bCost * 0.985 * 100) / 100 : null;
  const res1     = pct80C  > 0 ? Math.round(pct80C  * 100) / 100 : null;
  const res2     = periHigh > 0 ? Math.round(periHigh * 100) / 100 : null;

  // ── 渲染輔助 ──
  function mkSection(bColor, title, rows) {
    const sec = document.createElement("div");
    sec.className = "csec";
    sec.style.borderLeftColor = bColor;
    sec.innerHTML = "<div style='font-size:11px;font-weight:500;color:"+bColor+";margin-bottom:7px'>"+title+"</div>";
    rows.forEach(([lbl, val, vc]) => {
      const d = document.createElement("div");
      d.className = "ckv";
      d.innerHTML = "<span style='color:#666'>"+lbl+"</span>"+
                    "<span style='font-weight:500;color:"+(vc||"#333")+"'>"+val+"</span>";
      sec.appendChild(d);
    });
    body.appendChild(sec);
  }

  function mkPriceRow(items) {
    const wrap = document.createElement("div");
    wrap.style.cssText = "display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px";
    items.forEach(([lbl, val, c, bg]) => {
      if (val == null) return;
      const d = document.createElement("div");
      d.className = "cpbox";
      d.style.background = bg || "#f5f7ff";
      d.innerHTML = "<div style='font-size:10px;color:#888;margin-bottom:2px'>"+lbl+"</div>"+
                    "<div style='font-size:17px;font-weight:500;color:"+c+";font-variant-numeric:tabular-nums'>"+
                    val.toFixed(2)+"</div><div style='font-size:10px;color:#aaa'>元</div>";
      wrap.appendChild(d);
    });
    body.appendChild(wrap);
  }

  // ── 換手結構 ──
  if (handoffDetected) {
    let handoffType, counterLabel, counterList;
    if (usesModeA) {
      // 一個賣方 → 多個買方
      const bList = buyerPeers.slice().sort((a,b) => a.r-b.r)
                               .map(p => p.peer+"(r="+p.r.toFixed(2)+")").join("、");
      handoffType  = sellerBroker+" 賣出 → "+buyerPeers.length+" 家分點承接";
      counterLabel = "買方分點";
      counterList  = bList.length > 64 ? bList.slice(0,64)+"…" : bList;
    } else {
      // 多個賣方 → 一個買方
      const sList = sellerPeers.slice().sort((a,b) => a.r-b.r)
                               .map(p => p.peer+"(r="+p.r.toFixed(2)+")").join("、");
      handoffType  = sellerPeers.length+" 家協同分點賣出 → "+buyerBroker+" 承接";
      counterLabel = "賣方分點";
      counterList  = sList.length > 64 ? sList.slice(0,64)+"…" : sList;
    }
    mkSection("#1565c0", "▌ 換手結構分析（偵測到協同換手）", [
      ["換手型態",   handoffType,                                                             "#0d47a1"],
      [counterLabel, counterList,                                                             "#546e7a"],
      ["對手同源",   sameOriginCount > 0 ? sameOriginCount+" 對 r≥+0.6（疑同主力多通道）" : "未偵測到同源對",
                    sameOriginCount > 0 ? "#e65100" : "#888"],
      ["強度比說明", "強度比＜50% 為換手雙腳計算假象，非控盤減弱訊號",                      "#999"],
    ]);
  } else {
    mkSection("#9e9e9e", "▌ 換手結構分析", [
      ["偵測結果", "未偵測到明顯換手結構（分點獨立操作）", "#666"],
    ]);
  }

  // ── 籌碼現況 ──
  const chipRows = [];
  if (bCost) {
    chipRows.push(["主力均成本（"+(costBroker||"買方")+"）",
      bCost.toFixed(2)+" 元　浮盈 "+(bPnl >= 0 ? "+" : "")+bPnl.toFixed(2)+"%",
      bPnl >= 0 ? "#1b5e20" : "#c62828"]);
    chipRows.push(["累計買超 / 聰明錢",
      bBuy.toFixed(0)+" 張　/ 　"+bSm.toFixed(1)+"%",
      bSm >= 60 ? "#0d47a1" : "#546e7a"]);
    if (handoffRate != null) {
      const hrC = handoffRate >= 60 ? "#1b5e20" : handoffRate >= 40 ? "#e65100" : "#c62828";
      const hrL = handoffRate >= 60 ? "籌碼轉換確認 ✓" :
                  handoffRate >= 40 ? "部分換手" : "換手跡象不明";
      chipRows.push(["  ↳ 買超日同時融資減少（換手確認率）",
        handoffRate+"% （"+cBuyFinDown+"/"+cBuyDays+" 日）　"+hrL, hrC]);
    }
    if (cSellFinUp > 0) {
      chipRows.push(["  ↳ 主力賣超＋融資增加（出貨警訊日）",
        cSellFinUp+" 日",
        cSellFinUp >= 3 ? "#c62828" : "#e65100"]);
    }
  }
  if (latestFin != null) {
    chipRows.push(["融資餘額（散戶壓力）",
      latestFin.toLocaleString()+" 張",
      latestFin > 20000 ? "#c62828" : "#e65100"]);
  }
  const instSign = sumI >= 0 ? "+" : "";
  chipRows.push([META.days+"日三大法人淨",
    instSign+sumI.toLocaleString()+" 張（外資 "+(sumF>=0?"+":"")+Math.round(sumF).toLocaleString()+"）",
    sumI >= 0 ? "#1565c0" : sumI >= -5000 ? "#e65100" : "#c62828"]);
  mkSection("#2e7d32", "▌ 籌碼現況", chipRows);

  // ── 支撐 / 壓力位 ──
  const priceLabel = document.createElement("div");
  priceLabel.style.cssText = "font-size:11px;font-weight:500;color:#546e7a;margin-bottom:8px";
  priceLabel.textContent = "▌ 技術位（支撐 / 壓力）";
  body.appendChild(priceLabel);
  mkPriceRow([
    ["強支撐",          sup2,              "#1565c0", "#eef2ff"],
    ["主力成本（支撐）", sup1,             "#1976d2", "#e8f0fe"],
    ["現價",            curP > 0 ? curP : null, "#37474f", "#f5f5f5"],
    ["壓力一",          res1,              "#e65100", "#fff3e0"],
    ["壓力二（近高）",  res2,              "#c62828", "#fff0f0"],
  ]);

  // ── 操作研判 ──
  let concText = "", concColor = "#333";
  if (handoffDetected) {
    const profitNote = bPnl != null
      ? (Math.abs(bPnl) <= 5 ? "主力成本區間安全（浮盈"+(bPnl>=0?"+":"")+bPnl.toFixed(1)+"%），護盤動機存在。" : "")
      : "";
    const finNote = latestFin
      ? "融資餘額 "+latestFin.toLocaleString()+" 張構成頭部壓力，突破壓力前留意解套賣壓。"
      : "";
    const todayISign = todayI >= 0 ? "+" : "";
    const instNote = todayI > 300
      ? "三大法人今日買超 "+todayISign+todayI.toLocaleString()+" 張，短線籌碼支撐。"
      : todayI < -300
      ? "三大法人今日賣超 "+todayI.toLocaleString()+" 張（"+META.days+"日累計 "+(sumI>=0?"+":"")+sumI.toLocaleString()+"），需持續追蹤。"
      : Math.abs(sumI) < 5000
      ? "三大法人今日小幅動作，帳面流出為換手結構所致，非實際退場。"
      : sumI > 0 ? "三大法人"+META.days+"日累計買超，籌碼面支撐良好。"
      : "三大法人今日小幅動作，"+META.days+"日累計淨賣 "+Math.abs(sumI).toLocaleString()+" 張，持續觀察。";
    const confirmNote = handoffRate != null
      ? "換手確認率 "+handoffRate+"%（主力買超日中融資同步縮減）。"
      : "";
    concText = "換手完成、籌碼改善。"+confirmNote+profitNote+finNote+instNote+"等待催化劑配合，可能啟動主升段。";
    concColor = "#1b5e20";
  } else {
    const g = COMPOSITE.total;
    concText = "未偵測換手結構，依綜合評分 "+g+" 分（"+COMPOSITE.grade+"）研判："+
      (g >= 65 ? "籌碼面偏多，持續關注主力分點動向。" :
       g >= 50 ? "籌碼面中性，觀望待突破訊號。" : "籌碼面偏弱，宜減碼審慎應對。");
    concColor = COMPOSITE.color;
  }
  const opDiv = document.createElement("div");
  opDiv.style.cssText = "border-left:3px solid "+concColor+";padding:12px 16px;background:"+concColor+"12;border-radius:0 8px 8px 0;margin-bottom:10px";
  opDiv.innerHTML = "<div style='font-size:11px;font-weight:500;color:"+concColor+";margin-bottom:5px'>▌ 操作研判</div>"+
                    "<div style='font-size:13px;line-height:1.8;color:#333'>"+concText+"</div>";
  body.appendChild(opDiv);

  const disc = document.createElement("div");
  disc.style.cssText = "font-size:10px;color:#bbb;margin-top:8px;line-height:1.6";
  disc.textContent = "★ 以上由系統依籌碼數據自動生成，僅供輔助研判，不構成投資建議。請搭配大盤環境、基本面與個人風控評估後操作。";
  body.appendChild(disc);
})();

  const corner = hdr.insertCell();
  corner.style.cssText = "min-width:90px;position:sticky;left:0;background:#fff;z-index:3";

    hdr.appendChild(th);

  STREAK.forEach(s => {
    const row = tbl.insertRow();
    const nc = row.insertCell();
    nc.style.cssText = "font-size:11px;padding:1px 8px 1px 4px;text-align:right;white-space:nowrap;position:sticky;left:0;background:#fff;z-index:2";
    nc.textContent = s.name;
    s.cells.forEach((v, i) => {
      const td = row.insertCell();
      td.style.cssText = "width:22px;height:20px;border-radius:3px;cursor:default";
      if (v > 0) {
        const a = 0.15 + 0.75 * (v / maxV);
        td.style.background = "rgba(21,101,192," + a.toFixed(2) + ")";
      } else if (v < 0) {
        const a = 0.15 + 0.75 * (Math.abs(v) / maxV);
        td.style.background = "rgba(230,57,70," + a.toFixed(2) + ")";
      } else {
        td.style.background = "rgba(220,220,220,0.35)";
      }
      td.title = s.name + "  " + DATES[i] + "：" + (v > 0 ? "+" : "") + v.toFixed(1) + " 張";
    });
  });
})();

function rColor(r) {
  if (r == null) return "#ccc";
  if (r >=  0.5) return "#0d47a1";
  if (r >=  0.3) return "#1976d2";
  if (r <= -0.5) return "#b71c1c";
  if (r <= -0.3) return "#e53935";
  return "#999";
}
function rFmt(r) {
  if (r == null) return "—";
  return (r >= 0 ? "+" : "") + r.toFixed(2);
}
function smLabel(score) {
  if (score >= 70) return ["聰明錢 ★★★", "#0d47a1"];
  if (score >= 50) return ["逢低布局 ★★", "#1976d2"];
  if (score >= 30) return ["混合型 ★",    "#546e7a"];
  if (score >  0)  return ["追漲型",       "#e65100"];
  return ["無買進記錄", "#bbb"];
}

    if (pnl == null) return { label: "—", color: "#bbb" };
    const label = pnl >= 10 ? "大幅獲利" : pnl >= 3 ? "小幅獲利" : pnl >= 0 ? "微幅獲利" :
                  pnl >= -5 ? "微幅浮虛" : pnl >= -10 ? "明顯套牢" : "深度套牢";
    const color = pnl >= 3 ? "#1b5e20" : pnl >= 0 ? "#388e3c" : pnl >= -5 ? "#e65100" : "#b71c1c";
    return { label, color };
  }

  const costData = STREAK.filter(s => s.costBand?.avgCost).slice();
  costData.sort((a, b) => b.costBand.totalBuy - a.costBand.totalBuy);

  const costTbody = document.getElementById("costRows");
  costData.forEach(s => {
    const cb   = s.costBand;
    const cbB  = hasBtm ? s.costBandBottom : null;
    const pnlA = cb.pnlPct ?? null;
    const pnlB = cbB?.pnlPct ?? null;

    // 底部後無買入 = 已出清庫存（底部成本才是真實持倉成本，無則代表沒庫存）
    const noInventory = hasBtm && !cbB;
    const nameCell = noInventory
      ? s.name + " <span title='底部後無買入，當前無庫存' style='background:#888;color:#fff;border-radius:2px;padding:0 3px;font-size:9px'>已出清</span>"

    // 底部起算欄
    const btmCell = hasBtm

      : (cb.curPrice?.toFixed(2) ?? "—");

    // 狀態：已出清用灰色，其餘用浮盈判斷
    let bDisplay, displayPnl;
    if (noInventory) {
      bDisplay   = { label: "已出清", color: "#999" };
      displayPnl = null;
    } else {
      displayPnl = pnlB ?? pnlA;
      bDisplay   = pnlBadge(displayPnl);
    }

    function netCell(v) {
      if (v == null) return "<span style='color:#bbb'>—</span>";
      const c = v >= 0 ? "#1565c0" : "#c62828";
      return "<span style='color:" + c + ";font-weight:600'>" + (v >= 0 ? "+" : "") + v + "</span>";
    }
    const net240   = s.total ?? null;
    const netBtm   = s.netBottom ?? null;

    const tr = document.createElement("tr");
    tr.style.opacity = noInventory ? "0.55" : "1";
    tr.innerHTML =
      "<td>" + nameCell + "</td>" +
      "<td style='text-align:right;font-variant-numeric:tabular-nums'>" + netCell(net240) + "</td>" +
      "<td style='text-align:right;font-variant-numeric:tabular-nums'>" + netCell(netBtm) + "</td>" +
      "<td style='text-align:right;font-variant-numeric:tabular-nums;color:" + (pnlA >= 0 ? "#388e3c" : "#c62828") + "'>" +
        cb.avgCost.toFixed(2) + " <span style='font-size:10px'>(" + (pnlA >= 0 ? "+" : "") + pnlA.toFixed(1) + "%)</span></td>" +
      "<td style='text-align:right;font-variant-numeric:tabular-nums'>" + btmCell + "</td>" +
      "<td style='text-align:right;color:" + bDisplay.color + ";font-variant-numeric:tabular-nums;font-size:11px'>" +
        (displayPnl != null ? (displayPnl >= 0 ? "+" : "") + displayPnl.toFixed(2) + "%" : "—") + "</td>" +
      "<td><span class='badge' style='background:" + bDisplay.color + "22;color:" + bDisplay.color + "'>" + bDisplay.label + "</span></td>";
    costTbody.appendChild(tr);
  });

  document.getElementById("costNote").innerHTML =
    "<div style='background:#f9f9f9;border-radius:8px;padding:10px 14px;margin-top:8px;font-size:11px;color:#555;line-height:1.8'>" +
    "<b>全期成本</b>：分析窗口（" + META.days + "日）內淨買超日的加權均價，包含底部前的操作。" +
    (hasBtm ? "<br><b>底部起算成本</b>（近" + bottomDays + "日）：僅計算底部日之後的買入，反映現在這批籌碼的實際持倉成本。" +

    "<br>狀態欄優先使用底部起算浮盈判斷（更貼近當前部位）。" +
    "</div>";

      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:"index", intersect:false },
      plugins:{
        legend:{ position:"top", labels:{ font:{size:10}, boxWidth:10, padding:6 } },
        tooltip:{
          callbacks:{
            label: ctx => {
              if(ctx.raw==null) return null;
              const sign = ctx.raw >= 0 ? "+" : "";
              return ctx.dataset.label+"："+sign+ctx.raw.toLocaleString()+" 張";
            }
          }
        }
      },
      scales:{
        x:{ ticks:{font:{size:10},maxRotation:45}, grid:{color:"#f0f0f0"} },
        yDiff:{ position:"left",  ticks:{font:{size:10},callback:v=>(v>0?"+":"")+v}, grid:{color:"#f0f0f0"},
                title:{display:true,text:"增減（張）",font:{size:11}} },
        yBal: { position:"right", min:0, ticks:{font:{size:10},callback:v=>v.toLocaleString()},
                grid:{drawOnChartArea:false}, title:{display:true,text:"餘額（張）",font:{size:11}} }
      }
    }
  });

  document.getElementById("instNote").innerHTML =
    "<div style='background:#f9f9f9;border-radius:8px;padding:10px 14px;margin-top:8px'>" +
    "<div style='font-size:11px;font-weight:600;color:#333;margin-bottom:6px'>▌ 這兩個圖在看什麼</div>" +
    "<div style='font-size:11px;color:#555;line-height:1.8;margin-bottom:8px'>" +
    "上圖「<b>三大法人</b>」：外資（藍）/ 投信（綠）/ 自營商（橙）每天的買賣超張數，堆疊柱狀顯示合計方向。" +
    "外資買超是最強信號（資金規模最大，決策有依據）；投信連買通常意味著基金在建倉，持股穩定；自營商偏短線，參考性較低。" +
    "</div>" +
    "<div style='font-size:11px;color:#555;line-height:1.8;margin-bottom:8px'>" +
    "下圖「<b>融資融券</b>」：融資餘額（藍線）= 散戶借錢買股的總量；融資增減（柱）= 每天增加或減少多少。" +
    "融券餘額（紅虛線）= 市場放空部位。" +
    "</div>" +
    "<div style='display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;font-size:11px'>" +
    "<div style='background:#e8f5e9;border-radius:4px;padding:6px 10px'>" +
    "<b style='color:#1b5e20'>外資連買 + 投信買進</b><br>機構聯動，是主升段前最可靠的信號。</div>" +
    "<div style='background:#fff5f5;border-radius:4px;padding:6px 10px'>" +
    "<b style='color:#b71c1c'>融資急升 + 股價漲</b><br>散戶追多，籌碼不穩，上漲過程隨時有斷頭賣壓。</div>" +
    "<div style='background:#e3f2fd;border-radius:4px;padding:6px 10px'>" +
    "<b style='color:#0d47a1'>融資急降</b><br>散戶去槓桿（自願或斷頭），籌碼清洗進行中。</div>" +
    "<div style='background:#fff8e1;border-radius:4px;padding:6px 10px'>" +
    "<b style='color:#e65100'>融券增加</b><br>放空者增加，若借券也同步增加 = 雙重打壓壓力。</div>" +
    "</div>" +
    "<div style='font-size:11px;background:#fffde7;border-left:3px solid #f57f17;padding:6px 10px;border-radius:0 4px 4px 0'>" +
    "📌 <b>對 3715 的意義</b>：外資連買 + 投信加碼 = 主力拉升前的前兆；融資持續高位未退 = 上漲阻力（高點容易被斷頭壓回）。" +
    "</div></div>";
})();

// ── 官股券商動向（已移除）────────────────────────────────────
if (false) {
  // govCard removed
  document.getElementById("govTitle").textContent  = "官股券商動向分析";
  document.getElementById("thGovBroker").textContent = "分點名稱";
  document.getElementById("thGovTotal").textContent  = "累計淨買賣超（張）";
  document.getElementById("thGovDays").textContent   = "買超日 / 賣超日";
  document.getElementById("thGovDir").textContent    = "方向判斷";

  // 統計指標列
  const statsEl = document.getElementById("govStats");
  function statBox(label, val, color) {
    const d = document.createElement("div");
    d.style.cssText = "background:#f9f9f9;border-radius:8px;padding:8px 16px;text-align:center;min-width:100px";
    d.innerHTML = "<div style='font-size:11px;color:#999;margin-bottom:3px'>" + label + "</div>" +
                  "<div style='font-size:16px;font-weight:500;color:" + color + "'>" + val + "</div>";
    statsEl.appendChild(d);
  }
  const totalSign = GOV.total >= 0 ? "+" : "";
  statBox("期間合計（張）", totalSign + GOV.total.toLocaleString(),
          GOV.total >= 0 ? "#1565c0" : "#e63946");
  statBox("出現分點數", GOV.series.length, "#37474f");
  statBox("護盤日（買超）", GOV.buyDays + " 天", "#388e3c");
  statBox("賣壓日（賣超）", GOV.sellDays + " 天", "#c62828");

  // 逐日堆疊柱狀圖
  const govDs = GOV.series.map(s => ({
    label:           s.name,
    data:            s.data,
    backgroundColor: s.color + "cc",
    borderColor:     s.color,
    borderWidth:     1,
    stack:           "gov",
  }));
  new Chart(document.getElementById("govChart"), {
    type: "bar",
    data: { labels: DATES, datasets: govDs },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { position: "top", labels: { font: { size: 10 }, boxWidth: 10, padding: 8 } },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (!ctx.raw) return null;
              const sign = ctx.raw > 0 ? "+" : "";
              return ctx.dataset.label + "：" + sign + ctx.raw.toLocaleString() + " 張";
            },
            footer: items => {
              const sum = items.reduce((a, b) => a + (b.raw || 0), 0);
              return sum ? "合計：" + (sum > 0 ? "+" : "") + sum.toFixed(1) + " 張" : "";
            }
          },
          filter: item => item.raw !== null && item.raw !== 0,
        }
      },
      scales: {
        x: { stacked: true, ticks: { font: { size: 10 }, maxRotation: 45 }, grid: { color: "#f0f0f0" } },
        y: { stacked: true,
             ticks: { font: { size: 10 }, callback: v => (v > 0 ? "+" : "") + v.toLocaleString() },
             grid: { color: "#f0f0f0" },
             title: { display: true, text: "淨買賣超（張）", font: { size: 11 } } }
      }
    }
  });

  // 明細表
  const govTbody = document.getElementById("govRows");
  GOV.series.forEach(s => {
    const buyDays  = s.data.filter(v => v > 0).length;
    const sellDays = s.data.filter(v => v < 0).length;
    const sign     = s.total >= 0 ? "+" : "";
    const dirColor = s.total >= 0 ? "#1565c0" : "#e63946";
    const dirLabel = s.total > 5  ? "護盤 / 買進" :
                     s.total < -5 ? "賣壓 / 出貨" : "中性 / 觀望";
    const tr = document.createElement("tr");
    tr.innerHTML =
      "<td><span style='display:inline-block;width:10px;height:10px;border-radius:2px;background:" +
        s.color + ";margin-right:6px;vertical-align:middle'></span>" + s.name + "</td>" +
      "<td style='text-align:right;color:" + dirColor + ";font-variant-numeric:tabular-nums'>" +
        sign + s.total.toLocaleString() + "</td>" +
      "<td style='color:#555'>" + buyDays + " / " + sellDays + "</td>" +
      "<td><span class='badge' style='background:" + dirColor + "22;color:" + dirColor + "'>" +
        dirLabel + "</span></td>";
    govTbody.appendChild(tr);
  });
  document.getElementById("govNote").innerHTML =
    "<div style='font-size:11px;color:#555;margin-top:8px;line-height:1.8'>" +
    "<b>官股券商</b>：台銀、土銀、兆豐、第一金、合庫、彰銀、華南、企銀（政府持股的券商）。" +
    "官股券商合計淨買超 = 護盤（政府資金進場穩定市場）；合計淨賣超 = 無護盤壓力。" +
    "<br>對中小型股意義不大（護盤通常針對指數大型股）；若出現在小型股則代表特殊情況。" +
    "</div>";
}

// ── 相關係數表 ──────────────────────────────────────────────
const corrTbody = document.getElementById("corrRows");
CORR.forEach(row => {
  const tr = document.createElement("tr");
  const sign = row.r >= 0 ? "+" : "";
  tr.innerHTML =
    "<td>"+row.a+"</td><td>"+row.b+"</td>" +
    "<td style='text-align:right'>"+sign+row.r.toFixed(2)+"</td>" +
    "<td><span class='badge' style='background:"+row.color+"22;color:"+row.color+"'>"+row.label+"</span></td>";
  corrTbody.appendChild(tr);
});

</script>
</body>
