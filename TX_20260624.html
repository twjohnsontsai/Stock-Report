<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>台指期 TX｜2026/06/24｜近 5 個交易日</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#0d0f14;color:#ccc;font-family:"Microsoft JhengHei",sans-serif;
       display:flex;flex-direction:column;height:100vh;overflow:hidden}
  #hdr{flex-shrink:0;background:#11151e;border-bottom:1px solid #1e2635;
        padding:6px 14px;font-size:12px;color:#aaa;line-height:1.9}
  #main-layout{flex:1;display:flex;min-height:0;overflow:hidden}
  #chart{flex:1;min-width:0;height:100%}
  #panel-col{width:220px;flex-shrink:0;overflow-y:auto;
              background:#0d0f14;border-left:1px solid #1a2030}
  /* chip_analyzer hpanel 風格 */
  #hpanel{background:rgba(17,24,32,0.95);padding:10px 12px;font-size:.75rem;
           border-radius:0;min-height:100%}
  .hd{font-weight:600;color:#d8e8f0;font-size:.82rem;margin-bottom:.5rem;
       padding-bottom:.4rem;border-bottom:1px solid #1e2635}
  .hs{font-size:.65rem;color:#6a8298;text-transform:uppercase;letter-spacing:.06em;
       margin:7px 0 3px;font-weight:600;border-top:1px solid #182030;padding-top:4px}
  .hr{display:flex;justify-content:space-between;align-items:center;padding:.15rem 0}
  .hl{color:#586880;font-size:.68rem}
  .hv{font-weight:600;font-variant-numeric:tabular-nums;font-size:.75rem}
  .lgnd{display:flex;align-items:center;gap:5px;padding:.18rem 0;font-size:.72rem;color:#8892a0}
  .lgnd-clr{width:22px;height:3px;border-radius:2px;flex-shrink:0}
  /* 下方展開區（先行訊號、現貨比較） */
  #expand{flex:1;overflow-y:auto;background:#0d0f14;padding:0 0 20px}
  h2{font-size:13px;color:#aaa;padding:14px 0 4px;margin:0}
  .legend-row{font-size:11px;padding:2px 0 8px;color:#aaa}
</style>
</head>
<body>
<div id="hdr">
  <b style="color:#ef5350;font-size:14px">TX</b>
  &nbsp;｜ 2026/06/24
  &nbsp;收 <b style="color:#ef5350">46207</b>
  &nbsp;現貨 <b>-</b>
  &nbsp;基差 <b style="color:#66bb6a">-</b>
  &nbsp;OI <b style="color:#ffb300">46,217</b>
  &nbsp;OI變化 <b style="color:#66bb6a">-54,672</b><br>
  外資 <b style="color:#ef5350">-76,502</b>
  &nbsp;投信 <b>+60,180</b>
  &nbsp;自營 <b>+4,302</b>
</div>
<div id="main-layout">
  <div id="chart"></div>
  <div id="panel-col">
    <div id="hpanel">
      <div class="hd">移至圖表查看數值</div>
      <div class="hs">圖例</div>
      <div class="lgnd"><div class="lgnd-clr" style="background:#ef5350;height:8px;border-radius:2px"></div>TX K線</div>
      <div class="lgnd"><div class="lgnd-clr" style="background:#f9a825"></div>MA5</div>
      <div class="lgnd"><div class="lgnd-clr" style="background:#42a5f5"></div>MA10</div>
      <div class="lgnd"><div class="lgnd-clr" style="background:#ab47bc"></div>MA20</div>
      <div class="lgnd"><div class="lgnd-clr" style="background:#ef5350;border:1px dashed #ef5350"></div>MA60</div>
      <div class="lgnd"><div class="lgnd-clr" style="background:#888"></div>成交量</div>
      <div class="lgnd"><div class="lgnd-clr" style="background:#ef5350;opacity:.65"></div>未平倉OI↑（紅）</div>
      <div class="lgnd"><div class="lgnd-clr" style="background:#66bb6a;opacity:.65"></div>未平倉OI↓（綠）</div>
      <div class="lgnd"><div class="lgnd-clr" style="background:#ffd54f"></div>OI MA5</div>
      <div class="lgnd"><div class="lgnd-clr" style="background:#ff8f00;border:1px dashed #ff8f00"></div>OI MA20</div>
      <div class="lgnd"><div class="lgnd-clr" style="background:#ef5350"></div>外資淨OI</div>
      <div class="lgnd"><div class="lgnd-clr" style="background:#42a5f5"></div>投信淨OI</div>
      <div class="lgnd"><div class="lgnd-clr" style="background:#aaa;border:1px dashed #aaa"></div>自營淨OI</div>
      <div class="lgnd"><div class="lgnd-clr" style="background:#80cbc4"></div>基差（現-期）</div>
      <div class="lgnd"><div class="lgnd-clr" style="background:#ef6c00"></div>RSI6</div>
      <div class="lgnd"><div class="lgnd-clr" style="background:#fdd835"></div>RSI12</div>
    </div>
  </div>
</div>
<div id="expand">
<script>
const D = {"dates": ["20260617", "20260618", "20260622", "20260623", "20260624"], "opens": [45835.0, 46470.0, 47460.0, 48650.0, 46940.0], "highs": [45933.0, 46778.0, 48476.0, 48711.0, 47072.0], "lows": [44926.0, 46260.0, 47371.0, 47404.0, 46022.0], "closes": [45020.0, 46769.0, 48413.0, 47436.0, 46207.0], "volumes": [null, 60125.0, 58587.0, 78573.0, null], "oi": [45030.0, 92786.0, 97365.0, 100889.0, 46217.0], "oi_chg": [null, 47756.0, 4579.0, 3524.0, -54672.0], "fi_net": [null, -68337, -70290, -76502, null], "it_net": [null, 58597, 61196, 60180, null], "dt_net": [null, 4189, 4250, 4302, null], "basis": [857.39, -303.8, -671.49, null, null], "rsi6": [null, null, null, null, null], "rsi12": [null, null, null, null, null], "ma5": [null, null, null, null, 46769.0], "ma10": [null, null, null, null, null], "ma20": [null, null, null, null, null], "ma60": [null, null, null, null, null], "oi_ma5": [null, null, null, null, 76457.4], "oi_ma20": [null, null, null, null, null]};
const dates   = D.dates.map(d => d.slice(0,4)+'/'+d.slice(4,6)+'/'+d.slice(6));
const volClr  = D.closes.map((c,i) => i===0?'#888': c>=D.closes[i-1]?'#ef5350':'#66bb6a');
const oiChgClr= D.oi_chg.map(v => v===null?'#888': v>=0?'#ef5350':'#66bb6a');

const traces = [
  // ── Panel 1: K線 + MA ──────────────────────────────────────────
  {type:'candlestick',x:dates,open:D.opens,high:D.highs,low:D.lows,close:D.closes,
    name:'TX',increasing:{line:{color:'#ef5350'},fillcolor:'#c62828'},
    decreasing:{line:{color:'#66bb6a'},fillcolor:'#2e7d32'},
    xaxis:'x',yaxis:'y1',whiskerwidth:0.3},
  {type:'scatter',mode:'lines',x:dates,y:D.ma5, name:'MA5', line:{color:'#f9a825',width:1.2},xaxis:'x',yaxis:'y1'},
  {type:'scatter',mode:'lines',x:dates,y:D.ma10,name:'MA10',line:{color:'#42a5f5',width:1.2},xaxis:'x',yaxis:'y1'},
  {type:'scatter',mode:'lines',x:dates,y:D.ma20,name:'MA20',line:{color:'#ab47bc',width:1.2},xaxis:'x',yaxis:'y1'},
  {type:'scatter',mode:'lines',x:dates,y:D.ma60,name:'MA60',line:{color:'#ef5350',width:1.5},xaxis:'x',yaxis:'y1'},
  // ── Panel 2: 成交量 ────────────────────────────────────────────
  {type:'bar',x:dates,y:D.volumes,name:'成交量',marker:{color:volClr},xaxis:'x',yaxis:'y2'},
  // ── Panel 3: 未平倉量（柱 + MA5 + MA20，紅=增/綠=減）────────
  {type:'bar',x:dates,y:D.oi,name:'未平倉OI',
    marker:{color:oiChgClr,opacity:0.45},xaxis:'x',yaxis:'y3'},
  {type:'scatter',mode:'lines',x:dates,y:D.oi_ma5,name:'OI MA5',
    line:{color:'#ffd54f',width:2},xaxis:'x',yaxis:'y3'},
  {type:'scatter',mode:'lines',x:dates,y:D.oi_ma20,name:'OI MA20',
    line:{color:'#ff8f00',width:2,dash:'dot'},xaxis:'x',yaxis:'y3'},
  // ── Panel 4: OI 日變化 ─────────────────────────────────────────
  {type:'bar',x:dates,y:D.oi_chg,name:'OI日變化',marker:{color:oiChgClr},xaxis:'x',yaxis:'y4'},
  // ── Panel 5: 三大法人淨OI ──────────────────────────────────────
  {type:'scatter',mode:'lines',x:dates,y:D.fi_net,name:'外資淨OI',
    line:{color:'#ef5350',width:2},xaxis:'x',yaxis:'y5'},
  {type:'scatter',mode:'lines',x:dates,y:D.it_net,name:'投信淨OI',
    line:{color:'#42a5f5',width:1.5},xaxis:'x',yaxis:'y5'},
  {type:'scatter',mode:'lines',x:dates,y:D.dt_net,name:'自營商淨OI',
    line:{color:'#aaa',width:1,dash:'dot'},xaxis:'x',yaxis:'y5'},
  {type:'scatter',mode:'lines',x:[dates[0],dates[dates.length-1]],y:[0,0],
    line:{color:'#444',width:1,dash:'dot'},showlegend:false,xaxis:'x',yaxis:'y5'},
  // ── Panel 6: 基差 ─────────────────────────────────────────────
  {type:'scatter',mode:'lines',x:dates,y:D.basis,name:'基差(現-期)',
    line:{color:'#80cbc4',width:2},fill:'tozeroy',fillcolor:'rgba(128,203,196,0.08)',
    xaxis:'x',yaxis:'y6'},
  {type:'scatter',mode:'lines',x:[dates[0],dates[dates.length-1]],y:[0,0],
    line:{color:'#555',width:1,dash:'dot'},showlegend:false,xaxis:'x',yaxis:'y6'},
  // ── Panel 7: RSI ──────────────────────────────────────────────
  {type:'scatter',mode:'lines',x:dates,y:D.rsi6, name:'RSI6',
    line:{color:'#ef6c00',width:1.5},xaxis:'x',yaxis:'y7'},
  {type:'scatter',mode:'lines',x:dates,y:D.rsi12,name:'RSI12',
    line:{color:'#fdd835',width:1.5},xaxis:'x',yaxis:'y7'},
  {type:'scatter',mode:'lines',x:[dates[0],dates[dates.length-1]],y:[80,80],
    line:{color:'#ef5350',width:1,dash:'dot'},showlegend:false,xaxis:'x',yaxis:'y7'},
  {type:'scatter',mode:'lines',x:[dates[0],dates[dates.length-1]],y:[20,20],
    line:{color:'#66bb6a',width:1,dash:'dot'},showlegend:false,xaxis:'x',yaxis:'y7'},
];

const layout = {
  paper_bgcolor:'#0d0f14', plot_bgcolor:'#0d0f14',
  font:{color:'#ccc',size:11},
  showlegend: false,
  margin:{l:60,r:10,t:4,b:48},
  xaxis:{type:'category',rangeslider:{visible:false},tickangle:-45,
          gridcolor:'#1a2030',color:'#aaa',nticks:20},
  grid:{rows:7,columns:1,pattern:'independent',roworder:'top to bottom'},
  yaxis: {domain:[0.80,1.00],gridcolor:'#1a2030',color:'#aaa',title:'TX 價格'},
  yaxis2:{domain:[0.69,0.79],gridcolor:'#1a2030',color:'#aaa',title:'成交量'},
  yaxis3:{domain:[0.58,0.68],gridcolor:'#1a2030',color:'#aaa',title:'OI(口)'},
  yaxis4:{domain:[0.47,0.57],gridcolor:'#1a2030',color:'#aaa',title:'OI變化'},
  yaxis5:{domain:[0.33,0.46],gridcolor:'#1a2030',color:'#aaa',title:'法人淨OI',
           zeroline:true,zerolinecolor:'#444'},
  yaxis6:{domain:[0.20,0.32],gridcolor:'#1a2030',color:'#aaa',title:'基差(點)',
           zeroline:true,zerolinecolor:'#444'},
  yaxis7:{domain:[0.00,0.19],gridcolor:'#1a2030',color:'#aaa',title:'RSI',range:[0,100]},
  hovermode:'x unified',
  hoverlabel:{bgcolor:'rgba(13,15,20,0.55)',bordercolor:'#555',font:{color:'#fff',size:11}},
};

Plotly.newPlot('chart', traces, layout, {responsive:true,scrollZoom:false,
  modeBarButtonsToRemove:['select2d','lasso2d']});

// ── chip_analyzer 風格懸停面板 ────────────────────────────────────────────────
function updatePanel(i) {
  const p = document.getElementById('hpanel');
  const rv = (arr, d) => { const v = arr[i]; return v == null ? '—' : (d != null ? v.toFixed(d) : Math.round(v).toLocaleString()); };
  const row = (lbl, val, clr) => `<div class="hr"><span class="hl">${lbl}</span><span class="hv" style="color:${clr||'#c8d8e8'}">${val}</span></div>`;
  const sec = t => `<div class="hs">${t}</div>`;
  const rc  = v  => v == null ? '#8892a0' : v > 0 ? '#ef5350' : '#66bb6a';
  const kc  = D.closes[i] >= D.opens[i] ? '#ef5350' : '#66bb6a';

  p.innerHTML =
    `<div class="hd">${dates[i]}</div>` +
    sec('K 線') +
    row('開/收', rv(D.opens,0)+' / '+rv(D.closes,0), kc) +
    row('高/低', rv(D.highs,0)+' / '+rv(D.lows,0), '#8892a0') +
    row('MA5/MA20', rv(D.ma5,0)+' / '+rv(D.ma20,0), '#f9a825') +
    row('MA60', rv(D.ma60,0), '#ef5350') +
    sec('OI 籌碼') +
    row('成交量', rv(D.volumes,0), '#42a5f5') +
    row('未平倉OI', rv(D.oi,0), '#ffb300') +
    row('OI 變化', (D.oi_chg[i]!=null?(D.oi_chg[i]>0?'+':'')+Math.round(D.oi_chg[i]).toLocaleString():'—'), rc(D.oi_chg[i])) +
    sec('法人') +
    row('外資淨OI', (D.fi_net[i]!=null?(D.fi_net[i]>0?'+':'')+Math.round(D.fi_net[i]).toLocaleString():'—'), rc(D.fi_net[i])) +
    row('投信淨OI', (D.it_net[i]!=null?(D.it_net[i]>0?'+':'')+Math.round(D.it_net[i]).toLocaleString():'—'), rc(D.it_net[i])) +
    row('自營淨OI', (D.dt_net[i]!=null?(D.dt_net[i]>0?'+':'')+Math.round(D.dt_net[i]).toLocaleString():'—'), rc(D.dt_net[i])) +
    sec('技術') +
    row('基差(現-期)', rv(D.basis,1), rc(D.basis[i])) +
    row('RSI6', rv(D.rsi6,1), '#ef6c00') +
    row('RSI12', rv(D.rsi12,1), '#fdd835') +
    sec('圖例') +
    `<div class="lgnd"><div class="lgnd-clr" style="background:#f9a825"></div>MA5</div>` +
    `<div class="lgnd"><div class="lgnd-clr" style="background:#42a5f5"></div>MA10</div>` +
    `<div class="lgnd"><div class="lgnd-clr" style="background:#ab47bc"></div>MA20</div>` +
    `<div class="lgnd"><div class="lgnd-clr" style="background:#ef5350"></div>MA60（虛）</div>` +
    `<div class="lgnd"><div class="lgnd-clr" style="background:#ffd54f"></div>OI MA5</div>` +
    `<div class="lgnd"><div class="lgnd-clr" style="background:#ff8f00"></div>OI MA20（虛）</div>`;
}

document.getElementById('chart').on('plotly_hover', function(data) {
  updatePanel(data.points[0].pointIndex);
});
// 初始顯示最後一天
updatePanel(dates.length - 1);
</script>
<h2 style="padding:10px 14px 4px;margin:0;font-size:13px;color:#aaa">📋 每日指標總表（近期優先）</h2>
<div style="overflow-x:auto;padding:0 8px 24px">
<table id="dtbl" style="width:100%;border-collapse:collapse;font-size:11px;min-width:700px">
<thead>
<tr style="background:#1a2030;color:#aaa;position:sticky;top:0;z-index:10">
  <th style="padding:5px 6px;white-space:nowrap">日期</th>
  <th style="padding:5px 6px">收盤</th>
  <th style="padding:5px 6px">成交量</th>
  <th style="padding:5px 6px">未平倉OI</th>
  <th style="padding:5px 6px">OI變化</th>
  <th style="padding:5px 6px">基差</th>
  <th style="padding:5px 6px">外資淨OI</th>
  <th style="padding:5px 6px">投信</th>
  <th style="padding:5px 6px">自營</th>
</tr>
</thead>
<tbody id="dtbody"></tbody>
</table>
</div>
<script>
(function(){
  const D2 = {"dates": ["20260617", "20260618", "20260622", "20260623", "20260624"], "opens": [45835.0, 46470.0, 47460.0, 48650.0, 46940.0], "highs": [45933.0, 46778.0, 48476.0, 48711.0, 47072.0], "lows": [44926.0, 46260.0, 47371.0, 47404.0, 46022.0], "closes": [45020.0, 46769.0, 48413.0, 47436.0, 46207.0], "volumes": [null, 60125.0, 58587.0, 78573.0, null], "oi": [45030.0, 92786.0, 97365.0, 100889.0, 46217.0], "oi_chg": [null, 47756.0, 4579.0, 3524.0, -54672.0], "fi_net": [null, -68337, -70290, -76502, null], "it_net": [null, 58597, 61196, 60180, null], "dt_net": [null, 4189, 4250, 4302, null], "basis": [857.39, -303.8, -671.49, null, null], "rsi6": [null, null, null, null, null], "rsi12": [null, null, null, null, null], "ma5": [null, null, null, null, 46769.0], "ma10": [null, null, null, null, null], "ma20": [null, null, null, null, null], "ma60": [null, null, null, null, null], "oi_ma5": [null, null, null, null, 76457.4], "oi_ma20": [null, null, null, null, null]};
  const body = document.getElementById('dtbody');
  const n = D2.dates.length;
  function clr(v){ return v==null?'#aaa': v>0?'#ef5350': v<0?'#66bb6a':'#aaa'; }
  function basisClr(v){ return v==null?'#aaa': v>0?'#66bb6a': v<0?'#ef5350':'#aaa'; }
  const rows = [];
  for(let i=n-1; i>=0; i--){
    const d = D2.dates[i];
    const dstr = d.slice(0,4)+'/'+d.slice(4,6)+'/'+d.slice(6);
    const fi = D2.fi_net[i], it = D2.it_net[i], dt = D2.dt_net[i];
    const bas = D2.basis[i], oi = D2.oi[i], oiChg = D2.oi_chg[i];
    rows.push(`<tr style="border-bottom:1px solid #1a2030">
      <td style="padding:4px 6px;color:#ccc;white-space:nowrap">${dstr}</td>
      <td style="padding:4px 6px;color:#ef5350;font-weight:bold">${D2.closes[i]??'—'}</td>
      <td style="padding:4px 6px;color:#aaa">${oi==null?'—':Number(D2.volumes[i]||0).toLocaleString()}</td>
      <td style="padding:4px 6px;color:#ffb300">${oi==null?'—':Number(oi).toLocaleString()}</td>
      <td style="padding:4px 6px;color:${clr(oiChg)}">${oiChg==null?'—':(oiChg>0?'+':'')+Number(oiChg).toLocaleString()}</td>
      <td style="padding:4px 6px;color:${basisClr(bas)}">${bas==null?'—':Number(bas).toFixed(1)}</td>
      <td style="padding:4px 6px;color:${clr(fi)}">${fi==null?'—':(fi>0?'+':'')+fi.toLocaleString()}</td>
      <td style="padding:4px 6px;color:${clr(it)}">${it==null?'—':(it>0?'+':'')+it.toLocaleString()}</td>
      <td style="padding:4px 6px;color:${clr(dt)}">${dt==null?'—':(dt>0?'+':'')+dt.toLocaleString()}</td>
    </tr>`);
  }
  body.innerHTML = rows.join('');
})();
</script>
</div><!-- #expand -->
</body>
</html>
