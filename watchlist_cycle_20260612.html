<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>飆股觀察名單 2026-06-12</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0b07;--border:#2a2010;--gold:#c09840;--gold-dim:#604e1a;--gold-hi:#d4aa50;--verd:#3a6b55;--text:#e5d9c0;--text-dim:#9a8870;--text-muted:#453c25}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Serif TC',serif;background:var(--bg);color:var(--text);min-height:100vh;padding:40px 20px}
.wrap{max-width:680px;margin:0 auto}
h1{color:var(--gold);font-size:1.2rem;font-weight:300;letter-spacing:.4em;text-indent:.4em;margin-bottom:6px}
.sub{color:var(--text-muted);font-size:.72rem;letter-spacing:.18em;margin-bottom:28px}
.frame{position:relative;padding:20px;border:1px solid var(--border);background:linear-gradient(135deg,#18130a 0%,#110d05 100%)}
.frame::before{content:'';position:absolute;top:-1px;left:-1px;width:14px;height:14px;border-top:2px solid var(--verd);border-left:2px solid var(--verd)}
.frame::after{content:'';position:absolute;bottom:-1px;right:-1px;width:14px;height:14px;border-bottom:2px solid var(--verd);border-right:2px solid var(--verd)}
.label{font-size:.7rem;color:var(--verd);letter-spacing:.2em;margin-bottom:14px}
ul{list-style:none}
li{margin:6px 0}
a{display:block;padding:12px 16px 12px 20px;background:linear-gradient(180deg,#1d1708 0%,#141006 100%);border:1px solid var(--border);border-left:2px solid var(--gold-dim);color:var(--text-dim);text-decoration:none;font-size:.88rem;letter-spacing:.05em;transition:all .2s}
a:hover{border-left-color:var(--gold);color:var(--gold-hi);padding-left:24px}
.score{display:inline-block;background:rgba(192,152,64,.15);border:1px solid var(--gold-dim);border-radius:3px;padding:1px 7px;font-size:.72rem;color:var(--gold);margin-right:8px;vertical-align:middle}
.back{display:inline-block;margin-bottom:22px;font-size:.75rem;color:var(--text-muted);text-decoration:none;letter-spacing:.1em}
.back:hover{color:var(--text-dim)}
.ft{margin-top:30px;font-size:.68rem;color:var(--text-muted);text-align:center;letter-spacing:.1em;border-top:1px solid var(--border);padding-top:14px}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">&#8592; 返回投資股海</a>
  <h1>飆股觀察名單</h1>
  <p class="sub">2026-06-12 ｜ E 名單空頭撤退反攻 &#8805;50分 ｜ 期現籌碼週期全景圖</p>
  <div class="frame">
    <div class="label">&#9670; 期貨OI &times; 借券 &times; 前十大特定交易人 週期全景圖</div>
    <ul>
      <li><a href="2455_guf_cycle_chart.html"><span class="score">103分</span>2455 全新 &times; GUF — 期貨OI&times;借券&times;前十大週期圖</a></li>
      <li><a href="2337_dif_cycle_chart.html"><span class="score">88分</span>2337 旺宏 &times; DIF — 期貨OI&times;借券&times;前十大週期圖</a></li>
      <li><a href="6116_oef_cycle_chart.html"><span class="score">85分</span>6116 彩晶 &times; OEF — 期貨OI&times;借券&times;前十大週期圖</a></li>
    </ul>
  </div>
  <p class="ft">數據來源 TWSE &middot; 相關分析僅供投資參考，下單前請自行斟酌</p>
</div>
</body>
</html>
