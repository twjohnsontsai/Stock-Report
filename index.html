<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>每日分析報告清單</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            line-height: 1.6;
            background: #f4f7f9;
            color: #333;
        }

        .file-list {
            max-width: 550px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 20px;
            margin-top: 0;
            letter-spacing: 1px;
        }

        a {
            display: flex;
            align-items: center;
            padding: 16px;
            margin: 12px 0;
            background: #ffffff;
            color: #2563eb;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            border: 1px solid #e5e7eb;
            transition: all 0.3s ease;
        }

        a:hover {
            background: #f8faff;
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
        }

        a::before {
            content: "📊";
            margin-right: 12px;
            font-size: 1.2em;
        }

        .loading {
            text-align: center;
            color: #94a3b8;
            padding: 30px;
        }

        .error {
            color: #e11d48;
            background: #fff1f2;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ffe4e6;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="file-list">
        <h2>📈 投資分析報告清單</h2>
        <div id="list" class="loading">同步最新報告數據中...</div>
    </div>

    <script>
        const user = 'twjohnsontsai';
        const repo = 'Stock-Report';
        const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/?t=${new Date().getTime()}`;

        async function loadReports() {
            const listDiv = document.getElementById('list');
            try {
                const res = await fetch(apiUrl);
                if (!res.ok) throw new Error('無法讀取儲存庫');
                const files = await res.json();
                listDiv.innerHTML = '';

                const reports = files.filter(f => f.name.endsWith('.html') && f.name.toLowerCase() !== 'index.html');
                reports.sort((a, b) => b.name.localeCompare(a.name));

                reports.forEach(file => {
                    const a = document.createElement('a');
                    a.href = file.name;

                    let fileName = file.name.replace('.html', '');
                    let parts = fileName.split('_');

                    let stockId = parts[0] || "";
                    let typeCode = parts[1] || "";
                    let dateStr = parts[2] || "";

                    let typeName = "個股分析"; // 預設
                    let cycle = "";

                    // --- 核心邏輯修正 ---
                    // 1. 判斷借券分析：支援 90d 或檔名包含 lending
                    if (typeCode === "90d" || fileName.includes("lending")) {
                        typeName = "借券分析";
                        // 如果 typeCode 是 90d 就顯示 90日，否則預設為 60日（或您可以自行調整）
                        cycle = (typeCode === "90d") ? " (90日)" : " (60日)";
                    }
                    // 2. 判斷分點報告
                    else if (typeCode === "report") {
                        typeName = "分點報告";
                        cycle = " (30日)";
                    }
                    // 3. 判斷期貨技術分析 (GYF, CAF)
                    else if (typeCode === "future" || stockId === "GYF" || stockId === "CAF") {
                        typeName = "期貨技術分析";
                        cycle = (stockId === "GYF" || stockId === "CAF") ? " (60日)" : " (30日)";
                    }

                    // 處理兩段格式 (日期在第二段的情況)
                    if (parts.length === 2 && parts[1].length === 8 && !isNaN(parts[1])) {
                        dateStr = parts[1];
                    }

                    // 日期格式化
                    let formattedDate = dateStr;
                    if (dateStr && dateStr.length === 8) {
                        formattedDate = `${dateStr.substring(0, 4)}-${dateStr.substring(4, 6)}-${dateStr.substring(6, 8)}`;
                    }

                    a.textContent = `${stockId} ${typeName}${cycle} (${formattedDate})`;
                    listDiv.appendChild(a);
                });
            } catch (err) {
                listDiv.innerHTML = `<div class="error">⚠️ 載入失敗：${err.message}</div>`;
            }
        }
        loadReports();
    </script>
</body>

</html>
