<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>投資分析報告</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0b07;--bg-card:#17130a;--border:#2a2010;--gold:#c09840;--gold-dim:#604e1a;--gold-hi:#d4aa50;--verd:#3a6b55;--text:#e5d9c0;--text-dim:#9a8870;--text-muted:#453c25;--red:#7a2020}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Serif TC',serif;background-color:var(--bg);color:var(--text);min-height:100vh;padding:48px 20px;background-image:repeating-linear-gradient(45deg,rgba(192,152,64,.03) 0,rgba(192,152,64,.03) 1px,transparent 0,transparent 14px),repeating-linear-gradient(-45deg,rgba(192,152,64,.02) 0,rgba(192,152,64,.02) 1px,transparent 0,transparent 14px)}
canvas.galaxy{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.wrap{max-width:680px;margin:0 auto}
.hd{text-align:center;padding:0 0 40px}
.hd-rule{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.hd-rule::before,.hd-rule::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim))}
.hd-rule::after{background:linear-gradient(90deg,var(--gold-dim),transparent)}
.hd-gem{width:7px;height:7px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;box-shadow:0 0 8px rgba(192,152,64,.45)}
.hd h1{font-size:1.45rem;font-weight:300;color:var(--gold);letter-spacing:.5em;text-indent:.5em;margin-bottom:10px;text-shadow:0 0 22px rgba(192,152,64,.28),0 2px 4px rgba(0,0,0,.7)}
.hd p{font-size:.75rem;color:var(--text-dim);letter-spacing:.18em}
.hd-rule2{display:flex;align-items:center;gap:8px;margin-top:20px}
.hd-rule2::before,.hd-rule2::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border))}
.hd-rule2::after{background:linear-gradient(90deg,var(--border),transparent)}
.sec{margin-bottom:0}
.sec-title{display:flex;align-items:center;gap:10px;font-size:.75rem;color:var(--verd);letter-spacing:.25em;margin-bottom:14px}
.sec-title::before{content:'';width:3px;height:3px;background:var(--verd);transform:rotate(45deg);flex-shrink:0}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--verd),transparent);opacity:.4}
ul{list-style:none}
li{margin:5px 0}
a{display:block;padding:12px 16px 12px 20px;background:linear-gradient(180deg,#1d1708 0%,#141006 100%);border:1px solid var(--border);border-left:2px solid var(--gold-dim);color:var(--text-dim);text-decoration:none;font-size:.9rem;letter-spacing:.05em;transition:all .2s ease;box-shadow:inset 0 1px 0 rgba(192,152,64,.06),inset 0 -1px 0 rgba(0,0,0,.2)}
a:hover{border-left-color:var(--gold);border-color:#4a3818;background:linear-gradient(180deg,#251e0a 0%,#1a1508 100%);color:var(--gold-hi);padding-left:24px;box-shadow:inset 0 1px 0 rgba(192,152,64,.14),0 2px 10px rgba(0,0,0,.4)}
a.na{border-left-color:var(--red);color:#c0a090}
a.na:hover{border-left-color:#b04040;color:#e8c0b0;border-color:#5a2818;background:linear-gradient(180deg,#1e1008 0%,#180c06 100%)}
.frame{position:relative;padding:20px;border:1px solid var(--border);background:linear-gradient(135deg,#18130a 0%,#110d05 100%);box-shadow:inset 0 1px 0 rgba(192,152,64,.07),inset 0 -1px 0 rgba(0,0,0,.25),0 4px 24px rgba(0,0,0,.5),0 1px 3px rgba(0,0,0,.4)}
.frame::before{content:'';position:absolute;top:-1px;left:-1px;width:16px;height:16px;border-top:2px solid var(--verd);border-left:2px solid var(--verd)}
.frame::after{content:'';position:absolute;bottom:-1px;right:-1px;width:16px;height:16px;border-bottom:2px solid var(--verd);border-right:2px solid var(--verd)}
.ft{margin-top:40px;text-align:center;font-size:.7rem;color:var(--text-muted);letter-spacing:.12em;padding-top:16px;border-top:1px solid var(--border)}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes breathe{0%,100%{box-shadow:0 0 6px rgba(192,152,64,.4);transform:rotate(45deg) scale(1)}50%{box-shadow:0 0 22px rgba(192,152,64,.95);transform:rotate(45deg) scale(1.4)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes cPulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes spark{0%{transform:translateY(0) translateX(0);opacity:.75}100%{transform:translateY(-100vh) translateX(var(--dx,12px));opacity:0}}
@keyframes rotateSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.emblem{color:var(--gold);display:block;margin:0 auto 22px;filter:drop-shadow(0 0 10px rgba(192,152,64,.35));animation:rotateSlow 44s linear infinite,fadeUp .9s ease both}
.hd{animation:fadeUp .9s ease both}
.frame{animation:fadeUp .8s ease both}
.frame+.frame{animation-delay:.18s}
li{opacity:0;animation:fadeUp .5s ease forwards}
li:nth-child(1){animation-delay:.28s}li:nth-child(2){animation-delay:.38s}li:nth-child(3){animation-delay:.48s}li:nth-child(4){animation-delay:.58s}li:nth-child(5){animation-delay:.68s}li:nth-child(6){animation-delay:.78s}li:nth-child(7){animation-delay:.88s}li:nth-child(8){animation-delay:.98s}
.hd-gem{animation:breathe 3s ease-in-out infinite}
.hd-rule::before,.hd-rule::after{background:linear-gradient(90deg,transparent,rgba(192,152,64,.08),rgba(192,152,64,.6),rgba(192,152,64,.08),transparent);background-size:200% 100%;animation:shimmer 4s linear infinite}
.hd-rule::after{animation-delay:2s}
.frame::before{animation:cPulse 3s ease-in-out infinite}
.frame::after{animation:cPulse 3s 1.5s ease-in-out infinite}
.frame+.frame::before{animation-delay:2s}.frame+.frame::after{animation-delay:3.5s}
a{overflow:hidden;position:relative}
a::after{content:'';position:absolute;top:0;left:-120%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(192,152,64,.08),transparent);transition:left .5s ease;pointer-events:none}
a:hover::after{left:150%}
.pk{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.pk span{position:absolute;bottom:-4px;border-radius:50%;background:var(--gold);animation:spark var(--dur,9s) var(--delay,0s) linear infinite;opacity:0;z-index:1}
</style>
</head>
<body>
<canvas class="galaxy" aria-hidden="true"></canvas>
<div class="pk" aria-hidden="true"></div>
<div class="wrap">
  <div class="hd">
    <svg class="emblem" width="54" height="54" viewBox="0 0 56 56" fill="none" aria-hidden="true">
      <circle cx="28" cy="28" r="26.5" stroke="currentColor" stroke-width=".5" opacity=".3"/>
      <circle cx="28" cy="28" r="20" stroke="currentColor" stroke-width=".5" opacity=".2"/>
      <polygon points="28,4 41,12 48,24 48,32 41,44 28,52 15,44 8,32 8,24 15,12" stroke="currentColor" stroke-width=".75" opacity=".55"/>
      <polygon points="28,16 38,28 28,40 18,28" stroke="currentColor" stroke-width="1" opacity=".8"/>
      <circle cx="28" cy="28" r="2" fill="currentColor"/>
      <circle cx="28" cy="4" r="1.2" fill="currentColor" opacity=".5"/>
      <circle cx="28" cy="52" r="1.2" fill="currentColor" opacity=".5"/>
      <circle cx="8" cy="28" r="1.2" fill="currentColor" opacity=".5"/>
      <circle cx="48" cy="28" r="1.2" fill="currentColor" opacity=".5"/>
    </svg>
    <div class="hd-rule"><div class="hd-gem"></div></div>
    <h1>投資分析報告</h1>
    <p>籌碼分析 &middot; 分點進出 &middot; 財經節目</p>
    <div class="hd-rule2"></div>
  </div>
  <div class="sec frame">
    <div class="sec-title">每日籌碼摘要</div>
    <ul>
    <li><a href="daily_20260527.html">&#128202; 每日籌碼摘要 2026-05-27</a></li>
    <li><a href="daily_20260526.html">&#128202; 每日籌碼摘要 2026-05-26</a></li>
    <li><a href="daily_20260525.html">&#128202; 每日籌碼摘要 2026-05-25</a></li>
    <li><a href="daily_20260523.html">&#128202; 每日籌碼摘要 2026-05-23</a></li>
    <li><a href="daily_20260522.html">&#128202; 每日籌碼摘要 2026-05-22</a></li>
    </ul>
  </div>
  <div class="sec frame" style="margin-top:20px">
    <div class="sec-title">財經節目日報</div>
    <ul>
    <li><a href="財經日報_2026-05-27_晚間.html" class="na">&#128221; 財經日報 2026-05-27（晚間）（報告）</a></li>
    <li><a href="財經日報_2026-05-27_晚間_簡報.html" class="na">&#127916; 財經日報 2026-05-27（晚間）（簡報）</a></li>
    </ul>
  </div>
  <p class="ft">最後更新 &middot; 2026-05-27</p>
</div>
<script>
(function(){
  /* ── 上升金粒子 ── */
  var pk=document.querySelector('.pk');
  if(pk){for(var i=0;i<10;i++){var s=document.createElement('span');var sz=(1+Math.random()*1.8).toFixed(1);s.style.cssText='left:'+Math.floor(Math.random()*100)+'%;width:'+sz+'px;height:'+sz+'px;--dur:'+(8+Math.random()*9).toFixed(1)+'s;--delay:'+(Math.random()*12).toFixed(1)+'s;--dx:'+(Math.random()*28-14).toFixed(1)+'px';pk.appendChild(s);}}
  document.querySelectorAll('li').forEach(function(el,i){el.style.animationDelay=(0.28+i*0.09).toFixed(2)+'s'});

  /* ── Canvas 星系 ── */
  var cv=document.querySelector('canvas.galaxy');
  if(!cv)return;
  var cx=cv.getContext('2d');
  var W,H;
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',resize);

  /* 生成星星：微星 / 小星 / 中星 / 亮星 */
  var stars=[];
  var cfg=[
    {n:280,rMin:.25,rMax:.75,bMin:.2,bMax:.75,spMin:.15,spMax:.7,goldP:.08,blueP:.15},
    {n:80, rMin:.8, rMax:1.6,bMin:.4,bMax:.9, spMin:.3, spMax:1.4,goldP:.15,blueP:.2},
    {n:25, rMin:1.7,rMax:2.8,bMin:.55,bMax:1, spMin:.5, spMax:2, goldP:.3, blueP:.2},
    {n:8,  rMin:3,  rMax:5,  bMin:.7, bMax:1, spMin:.8, spMax:2.5,goldP:.45,blueP:.2}
  ];
  cfg.forEach(function(c){
    for(var i=0;i<c.n;i++){
      var rnd=Math.random();
      var col=rnd<c.goldP?'gold':(rnd<c.goldP+c.blueP?'blue':'white');
      stars.push({
        x:Math.random(),y:Math.random(),
        r:c.rMin+Math.random()*(c.rMax-c.rMin),
        base:c.bMin+Math.random()*(c.bMax-c.bMin),
        sp:c.spMin+Math.random()*(c.spMax-c.spMin),
        ph:Math.random()*Math.PI*2,
        col:col,tier:cfg.indexOf(c)
      });
    }
  });

  /* 星雲斑塊定義（固定，不動） */
  var nebulae=[
    {cx:.12,cy:.08,rx:.55,ry:.4,  angle:-.35,r:'192,152,64', a:.18},
    {cx:.88,cy:.9, rx:.6, ry:.45, angle:.4,  r:'58,107,85',  a:.16},
    {cx:.5, cy:.45,rx:.4, ry:.3,  angle:0,   r:'80,50,140',  a:.10},
    {cx:.25,cy:.7, rx:.35,ry:.28, angle:-.2, r:'40,80,120',  a:.09},
    {cx:.8, cy:.15,rx:.38,ry:.28, angle:.3,  r:'140,80,40',  a:.08}
  ];

  function drawNebula(){
    nebulae.forEach(function(nb){
      cx.save();
      cx.translate(nb.cx*W,nb.cy*H);
      cx.rotate(nb.angle);
      cx.scale(1,nb.ry/nb.rx);
      var g=cx.createRadialGradient(0,0,0,0,0,nb.rx*W);
      g.addColorStop(0,  'rgba('+nb.r+','+nb.a+')');
      g.addColorStop(.4, 'rgba('+nb.r+','+(nb.a*.45)+')');
      g.addColorStop(.75,'rgba('+nb.r+','+(nb.a*.12)+')');
      g.addColorStop(1,  'rgba('+nb.r+',0)');
      cx.fillStyle=g;
      cx.beginPath();cx.arc(0,0,nb.rx*W,0,Math.PI*2);cx.fill();
      cx.restore();
    });
  }

  /* 銀河臂（長橢圓弧帶） */
  function drawArm(){
    cx.save();
    cx.translate(W*.5,H*.48);
    cx.rotate(.32);
    cx.scale(1,.38);
    var g=cx.createRadialGradient(0,0,0,0,0,W*.72);
    g.addColorStop(0,  'rgba(192,152,64,.10)');
    g.addColorStop(.2, 'rgba(160,120,60,.07)');
    g.addColorStop(.55,'rgba(58,107,85,.04)');
    g.addColorStop(1,  'rgba(0,0,0,0)');
    cx.fillStyle=g;
    cx.beginPath();cx.arc(0,0,W*.72,0,Math.PI*2);cx.fill();
    cx.restore();
  }

  function drawStars(t){
    stars.forEach(function(s){
      var tw=s.base+(1-s.base)*.5*(1+Math.sin(t*s.sp+s.ph));
      cx.globalAlpha=tw;
      var sx=s.x*W, sy=s.y*H;
      /* 暈光（中星以上） */
      if(s.tier>=2){
        var haloR=s.r*(s.tier===3?6:4);
        var hcol=s.col==='gold'?'192,152,64':(s.col==='blue'?'160,190,255':'220,225,255');
        var hg=cx.createRadialGradient(sx,sy,0,sx,sy,haloR);
        hg.addColorStop(0,'rgba('+hcol+','+(tw*.9)+')');
        hg.addColorStop(.35,'rgba('+hcol+','+(tw*.3)+')');
        hg.addColorStop(1,'rgba('+hcol+',0)');
        cx.fillStyle=hg;
        cx.beginPath();cx.arc(sx,sy,haloR,0,Math.PI*2);cx.fill();
      }
      /* 星核 */
      cx.fillStyle=s.col==='gold'?'#d4aa50':(s.col==='blue'?'#aac8ff':'#e8eaf8');
      cx.beginPath();cx.arc(sx,sy,s.r,0,Math.PI*2);cx.fill();
    });
    cx.globalAlpha=1;
  }

  function tick(ts){
    var t=ts*.001;
    cx.clearRect(0,0,W,H);
    drawNebula();
    drawArm();
    drawStars(t);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
