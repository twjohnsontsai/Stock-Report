<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>每日投資分析報告清單</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            line-height: 1.6;
            background: #f4f7f9;
            color: #333;
        }

        .file-list {
            max-width: 550px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 20px;
            margin-top: 0;
        }

        a {
            display: flex;
            align-items: center;
            padding: 16px;
            margin: 12px 0;
            background: #ffffff;
            color: #2563eb;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            border: 1px solid #e5e7eb;
            transition: all 0.3s ease;
        }

        a:hover {
            background: #f8faff;
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
        }

        a::before {
            content: "📈";
            margin-right: 12px;
            font-size: 1.2em;
        }

        .loading {
            text-align: center;
            color: #94a3b8;
            padding: 30px;
        }

        .error {
            color: #e11d48;
            background: #fff1f2;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ffe4e6;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="file-list">
        <h2>📊 投資分析報告清單</h2>
        <div id="list" class="loading">同步最新報告數據中...</div>
    </div>

    <script>
        const user = 'twjohnsontsai';
        const repo = 'Stock-Report';
        const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/?t=${new Date().getTime()}`;

        async function loadReports() {
            const listDiv = document.getElementById('list');
            try {
                const res = await fetch(apiUrl);
                if (!res.ok) throw new Error('無法讀取儲存庫');
                const files = await res.json();
                listDiv.innerHTML = '';

                const reports = files.filter(f => f.name.endsWith('.html') && f.name.toLowerCase() !== 'index.html');
                reports.sort((a, b) => b.name.localeCompare(a.name));

                reports.forEach(file => {
                    const a = document.createElement('a');
                    a.href = file.name;

                    let fileName = file.name.replace('.html', '');
                    let parts = fileName.split('_');

                    let stockId = "";
                    let typeName = "個股分析";
                    let cycle = "";
                    let dateStr = "";

                    // --- 修正後的辨識邏輯 ---

                    // 1. 處理 chip 類型 (籌碼綜合分析)
                    if (fileName.includes("chip")) {
                        typeName = "籌碼綜合分析";
                        // 嘗試尋找帶有 d 的週期 (如 60d)，若無則預設 (60日)
                        let cycleMatch = fileName.match(/(\d+)d/);
                        cycle = cycleMatch ? ` (${cycleMatch[1]}日)` : " (60日)";

                        // 修正 stockId 與日期的抓取位置
                        stockId = parts.find(p => p !== "chip" && p.length <= 5 && isNaN(p) === false) || parts[1];
                        dateStr = parts.find(p => p.length >= 8 && !isNaN(p.replace(/-/g, ''))) || "";
                    }
                    // 2. 處理其他標準格式
                    else {
                        stockId = parts[0];
                        let typeCode = parts[1] || "";
                        dateStr = parts[2] || (typeCode.length >= 8 ? typeCode : "");

                        if (typeCode === "report") {
                            typeName = "分點報告";
                            cycle = " (30日)";
                        } else if (typeCode === "future" || stockId === "GYF" || stockId === "CAF") {
                            typeName = "期貨技術分析";
                            cycle = (stockId === "GYF" || stockId === "CAF") ? " (60日)" : " (30日)";
                        } else {
                            // 借券分析或其他數字型週期
                            let dayMatch = fileName.match(/(\d+)d/);
                            typeName = "借券分析";
                            cycle = dayMatch ? ` (${dayMatch[1]}日)` : " (60日)";
                        }
                    }

                    // 日期格式化
                    let cleanDate = dateStr.replace(/-/g, '');
                    let formattedDate = cleanDate.length === 8
                        ? `${cleanDate.substring(0, 4)}-${cleanDate.substring(4, 6)}-${cleanDate.substring(6, 8)}`
                        : dateStr;

                    a.textContent = `${stockId} ${typeName}${cycle} (${formattedDate})`;
                    listDiv.appendChild(a);
                });
            } catch (err) {
                listDiv.innerHTML = `<div class="error">⚠️ 載入失敗</div>`;
            }
        }
        loadReports();
    </script>
</body>

</html>
