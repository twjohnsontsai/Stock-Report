<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>每日分析報告總覽</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
            line-height: 1.6;
            background: #f4f5f7;
            color: #333;
        }

        .file-list {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        h2 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 25px;
            border-bottom: 2px solid #eef2f7;
            padding-bottom: 15px;
        }

        a {
            display: block;
            padding: 15px;
            margin: 10px 0;
            background: #f8fafc;
            color: #1565c0;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        a:hover {
            background: #eff6ff;
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .loading-text {
            text-align: center;
            color: #64748b;
            padding: 20px;
        }

        .error-text {
            color: #ef4444;
            background: #fef2f2;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #fee2e2;
        }
    </style>
</head>

<body>
    <div class="file-list">
        <h2>📈 投資分析報告清單</h2>
        <div id="list" class="loading-text">正在同步最新報告數據...</div>
    </div>

    <script>
        // 設定您的 GitHub 資訊
        const user = 'twjohnsontsai';
        const repo = 'Stock-Report';

        // 加上時間戳記強迫 API 抓取最新資料，避免快取延遲[cite: 1]
        const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/?t=${new Date().getTime()}`;

        async function loadReports() {
            const listDiv = document.getElementById('list');
            try {
                const res = await fetch(apiUrl);

                if (res.status === 403) {
                    throw new Error('API 訪問受限（請稍後再試）。');
                }
                if (!res.ok) {
                    throw new Error(`找不到儲存庫，請檢查設定。`);
                }

                const files = await res.json();
                listDiv.innerHTML = '';

                // 篩選出所有 HTML 檔案（排除目錄頁本身）[cite: 1]
                const reports = files.filter(f => f.name.endsWith('.html') && f.name.toLowerCase() !== 'index.html');

                if (reports.length === 0) {
                    listDiv.innerHTML = '<p style="color: #666; text-align: center;">目前資料夾內尚未上傳任何分析報告。</p>';
                    return;
                }

                // 按名稱降序排列（讓最新的日期/代號排在最上面）[cite: 1]
                reports.sort((a, b) => b.name.localeCompare(a.name));

                reports.forEach(file => {
                    const a = document.createElement('a');
                    a.href = file.name;

                    // --- 自動解析與翻譯名稱邏輯 ---[cite: 1]
                    let nameOnly = file.name.replace('.html', '');
                    let parts = nameOnly.split('_');

                    let stockId = parts[0] || "";
                    let typeCode = parts[1] || "";
                    let dateStr = parts[2] || "";

                    // 翻譯分析類型
                    let typeDisplayName = "個股分析";
                    if (typeCode === "90d") {
                        typeDisplayName = "借券分析";
                    } else if (typeCode === "report") {
                        typeDisplayName = "分點報告";
                    } else if (typeCode === "future") {
                        typeDisplayName = "期貨OI分析";
                    }

                    // 格式化日期（20260502 -> 2026-05-02）[cite: 1]
                    let finalDate = dateStr;
                    if (dateStr.length === 8) {
                        finalDate = `${dateStr.substring(0, 4)}-${dateStr.substring(4, 6)}-${dateStr.substring(6, 8)}`;
                    }

                    // 組合成最終顯示文字[cite: 1]
                    a.textContent = `📊 ${stockId} ${typeDisplayName} (${finalDate})`;
                    listDiv.appendChild(a);
                });

            } catch (err) {
                listDiv.innerHTML = `<div class="error-text">⚠️ 載入失敗：${err.message}</div>`;
                console.error(err);
            }
        }

        loadReports();
    </script>
</body>

</html>
