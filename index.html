<script>
    // 請確認這兩行與您的 GitHub 網址路徑完全一致
    const user = 'twjohnsontsai';
    const repo = 'Stock-Report';
    const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/`;

    fetch(apiUrl)
        .then(res => {
            if (!res.ok) throw new Error('API 請求失敗');
            return res.json();
        })
        .then(data => {
            const list = document.getElementById('list');
            list.innerHTML = '';

            // 篩選出所有 html 檔案，但排除掉 index.html 本身
            const htmlFiles = data.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');

            if (htmlFiles.length === 0) {
                list.innerHTML = '<p style="color: #888;">目前資料夾內沒有其他分析報告。</p>';
                return;
            }

            // 按檔名排序（讓最新的檔案出現在上面）
            htmlFiles.sort((a, b) => b.name.localeCompare(a.name));

            htmlFiles.forEach(f => {
                const a = document.createElement('a');
                a.href = f.name;
                // 讓顯示的名稱漂亮一點，去掉 .html
                a.textContent = '📊 ' + f.name.replace('.html', '');
                list.appendChild(a);
            });
        })
        .catch(err => {
            document.getElementById('list').innerHTML = '<p style="color: red;">載入失敗：請確認 GitHub 帳號與儲存庫名稱設定正確。</p>';
            console.error(err);
        });
</script>
