<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>投資分析報告</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0b07;--bg-card:#17130a;--border:#2a2010;--gold:#c09840;--gold-dim:#604e1a;--gold-hi:#d4aa50;--verd:#3a6b55;--text:#e5d9c0;--text-dim:#9a8870;--text-muted:#453c25;--red:#7a2020}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Serif TC',serif;background-color:var(--bg);color:var(--text);min-height:100vh;padding:48px 20px;background-image:repeating-linear-gradient(45deg,rgba(192,152,64,.04) 0,rgba(192,152,64,.04) 1px,transparent 0,transparent 14px),repeating-linear-gradient(-45deg,rgba(192,152,64,.025) 0,rgba(192,152,64,.025) 1px,transparent 0,transparent 14px),radial-gradient(ellipse 80% 55% at 8% 0%,rgba(192,152,64,.1) 0%,transparent 65%),radial-gradient(ellipse 80% 55% at 92% 100%,rgba(120,50,20,.08) 0%,transparent 65%),radial-gradient(ellipse 50% 40% at 50% 50%,rgba(58,107,85,.04) 0%,transparent 70%)}
.wrap{max-width:680px;margin:0 auto}
.hd{text-align:center;padding:0 0 40px}
.hd-rule{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.hd-rule::before,.hd-rule::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim))}
.hd-rule::after{background:linear-gradient(90deg,var(--gold-dim),transparent)}
.hd-gem{width:7px;height:7px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;box-shadow:0 0 8px rgba(192,152,64,.45)}
.hd h1{font-size:1.45rem;font-weight:300;color:var(--gold);letter-spacing:.5em;text-indent:.5em;margin-bottom:10px;text-shadow:0 0 22px rgba(192,152,64,.28),0 2px 4px rgba(0,0,0,.7)}
.hd p{font-size:.75rem;color:var(--text-dim);letter-spacing:.18em}
.hd-rule2{display:flex;align-items:center;gap:8px;margin-top:20px}
.hd-rule2::before,.hd-rule2::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border))}
.hd-rule2::after{background:linear-gradient(90deg,var(--border),transparent)}
.sec{margin-bottom:0}
.sec-title{display:flex;align-items:center;gap:10px;font-size:.75rem;color:var(--verd);letter-spacing:.25em;margin-bottom:14px}
.sec-title::before{content:'';width:3px;height:3px;background:var(--verd);transform:rotate(45deg);flex-shrink:0}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--verd),transparent);opacity:.4}
ul{list-style:none}
li{margin:5px 0}
a{display:block;padding:12px 16px 12px 20px;background:linear-gradient(180deg,#1d1708 0%,#141006 100%);border:1px solid var(--border);border-left:2px solid var(--gold-dim);color:var(--text-dim);text-decoration:none;font-size:.9rem;letter-spacing:.05em;transition:all .2s ease;box-shadow:inset 0 1px 0 rgba(192,152,64,.06),inset 0 -1px 0 rgba(0,0,0,.2)}
a:hover{border-left-color:var(--gold);border-color:#4a3818;background:linear-gradient(180deg,#251e0a 0%,#1a1508 100%);color:var(--gold-hi);padding-left:24px;box-shadow:inset 0 1px 0 rgba(192,152,64,.14),0 2px 10px rgba(0,0,0,.4)}
a.na{border-left-color:var(--red);color:#c0a090}
a.na:hover{border-left-color:#b04040;color:#e8c0b0;border-color:#5a2818;background:linear-gradient(180deg,#1e1008 0%,#180c06 100%)}
.frame{position:relative;padding:20px;border:1px solid var(--border);background:linear-gradient(135deg,#18130a 0%,#110d05 100%);box-shadow:inset 0 1px 0 rgba(192,152,64,.07),inset 0 -1px 0 rgba(0,0,0,.25),0 4px 24px rgba(0,0,0,.5),0 1px 3px rgba(0,0,0,.4)}
.frame::before{content:'';position:absolute;top:-1px;left:-1px;width:16px;height:16px;border-top:2px solid var(--verd);border-left:2px solid var(--verd)}
.frame::after{content:'';position:absolute;bottom:-1px;right:-1px;width:16px;height:16px;border-bottom:2px solid var(--verd);border-right:2px solid var(--verd)}
.ft{margin-top:40px;text-align:center;font-size:.7rem;color:var(--text-muted);letter-spacing:.12em;padding-top:16px;border-top:1px solid var(--border)}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes breathe{0%,100%{box-shadow:0 0 6px rgba(192,152,64,.4);transform:rotate(45deg) scale(1)}50%{box-shadow:0 0 22px rgba(192,152,64,.95);transform:rotate(45deg) scale(1.4)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes cPulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes spark{0%{transform:translateY(0) translateX(0);opacity:.75}100%{transform:translateY(-100vh) translateX(var(--dx,12px));opacity:0}}
@keyframes rotateSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.emblem{color:var(--gold);display:block;margin:0 auto 22px;filter:drop-shadow(0 0 10px rgba(192,152,64,.35));animation:rotateSlow 44s linear infinite,fadeUp .9s ease both}
.hd{animation:fadeUp .9s ease both}
.frame{animation:fadeUp .8s ease both}
.frame+.frame{animation-delay:.18s}
li{opacity:0;animation:fadeUp .5s ease forwards}
li:nth-child(1){animation-delay:.28s}li:nth-child(2){animation-delay:.38s}li:nth-child(3){animation-delay:.48s}li:nth-child(4){animation-delay:.58s}li:nth-child(5){animation-delay:.68s}li:nth-child(6){animation-delay:.78s}li:nth-child(7){animation-delay:.88s}li:nth-child(8){animation-delay:.98s}
.hd-gem{animation:breathe 3s ease-in-out infinite}
.hd-rule::before,.hd-rule::after{background:linear-gradient(90deg,transparent,rgba(192,152,64,.08),rgba(192,152,64,.6),rgba(192,152,64,.08),transparent);background-size:200% 100%;animation:shimmer 4s linear infinite}
.hd-rule::after{animation-delay:2s}
.frame::before{animation:cPulse 3s ease-in-out infinite}
.frame::after{animation:cPulse 3s 1.5s ease-in-out infinite}
.frame+.frame::before{animation-delay:2s}.frame+.frame::after{animation-delay:3.5s}
a{overflow:hidden;position:relative}
a::after{content:'';position:absolute;top:0;left:-120%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(192,152,64,.08),transparent);transition:left .5s ease;pointer-events:none}
a:hover::after{left:150%}
.pk{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.pk span{position:absolute;bottom:-4px;border-radius:50%;background:var(--gold);animation:spark var(--dur,9s) var(--delay,0s) linear infinite;opacity:0}
</style>
</head>
<body>

<script>
(function(){
  var pk=document.querySelector('.pk');
  if(pk){for(var i=0;i<14;i++){var s=document.createElement('span');var sz=(1+Math.random()*2).toFixed(1);s.style.cssText='left:'+Math.floor(Math.random()*100)+'%;width:'+sz+'px;height:'+sz+'px;--dur:'+(7+Math.random()*8).toFixed(1)+'s;--delay:'+(Math.random()*10).toFixed(1)+'s;--dx:'+(Math.random()*32-16).toFixed(1)+'px';pk.appendChild(s);}}
