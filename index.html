<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>每日分析報告清單</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            line-height: 1.6;
            background: #f9f9f9;
            color: #333;
        }

        .file-list {
            max-width: 550px;
            margin: 20px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #1a1a2e;
            border-bottom: 2px solid #eef2f7;
            padding-bottom: 15px;
            margin-top: 0;
        }

        #list {
            min-height: 100px;
        }

        a {
            display: block;
            padding: 14px;
            margin: 10px 0;
            background: #f1f5f9;
            color: #1d4ed8;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        a:hover {
            background: #dbeafe;
            border-color: #3b82f6;
            transform: translateY(-1px);
        }

        .loading {
            text-align: center;
            color: #64748b;
            padding: 20px;
        }

        .error {
            color: #dc2626;
            background: #fef2f2;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #fee2e2;
        }
    </style>
</head>

<body>
    <div class="file-list">
        <h2>📈 投資分析報告清單</h2>
        <div id="list" class="loading">正在獲取最新報告...</div>
    </div>

    <script>
        const user = 'twjohnsontsai';
        const repo = 'Stock-Report';
        // 增加時間戳記避免 API 快取舊資料
        const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/?t=${new Date().getTime()}`;

        async function loadReports() {
            const listDiv = document.getElementById('list');
            try {
                const res = await fetch(apiUrl);

                if (res.status === 403) {
                    throw new Error('API 訪問受限，請稍後再試。');
                }
                if (!res.ok) {
                    throw new Error(`找不到儲存庫，請檢查 GitHub 設定。`);
                }

                const files = await res.json();
                listDiv.innerHTML = '';

                // 篩選出 HTML 檔案（排除 index.html 自身）
                const reports = files.filter(f => f.name.endsWith('.html') && f.name.toLowerCase() !== 'index.html');

                if (reports.length === 0) {
                    listDiv.innerHTML = '<p style="color: #666; text-align: center;">目前資料夾內沒有分析報告。</p>';
                    return;
                }

                // 按名稱降序排列（確保最新日期在最前面）
                reports.sort((a, b) => b.name.localeCompare(a.name));

                reports.forEach(file => {
                    const a = document.createElement('a');
                    a.href = file.name;

                    // --- 解析邏輯開始 ---
                    let fileName = file.name.replace('.html', '');
                    let parts = fileName.split('_');

                    let stockId = parts[0] || "";
                    let typeCode = parts[1] || "";
                    let dateStr = parts[2] || "";

                    let typeName = "分析報告";
                    let cycleInfo = "";

                    // 1. 處理標準三段式 (如 1802_90d_20260502)
                    if (typeCode === "90d") {
                        typeName = "借券分析";
                        cycleInfo = " (90日)";
                    } else if (typeCode === "report") {
                        typeName = "分點報告";
                        cycleInfo = " (30日)";
                    } else if (typeCode === "future") {
                        typeName = "期貨技術分析";
                        cycleInfo = " (30日)";
                    }

                    // 2. 處理兩段式 (如 GYF_20260504 或 CAF_20260430)
                    if (parts.length === 2 && parts[1].length === 8 && !isNaN(parts[1])) {
                        dateStr = parts[1];
                        if (stockId === "GYF" || stockId === "CAF") {
                            typeName = "期貨技術分析";
                            cycleInfo = " (30日)";
                        } else {
                            typeName = "個股分析";
                        }
                    }

                    // 3. 格式化日期 (20260502 -> 2026-05-02)
                    let displayDate = dateStr;
                    if (dateStr && dateStr.length === 8) {
                        displayDate = `${dateStr.substring(0, 4)}-${dateStr.substring(4, 6)}-${dateStr.substring(6, 8)}`;
                    } else if (!dateStr) {
                        displayDate = "查看詳情";
                    }

                    // 顯示最終格式
                    a.textContent = `📊 ${stockId} ${typeName}${cycleInfo} (${displayDate})`;
                    // --- 解析邏輯結束 ---

                    listDiv.appendChild(a);
                });

            } catch (err) {
                listDiv.innerHTML = `<p class="error">⚠️ 錯誤：${err.message}</p>`;
                console.error(err);
            }
        }

        loadReports();
    </script>
</body>

</html>
