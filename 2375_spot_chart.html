  arr.forEach((v,i)=>{const xp=x.getPixelForValue(i);if(v&&!inB){inB=true;sx=xp;}if(!v&&inB){inB=false;flush(xp);}});
  if(inB)flush(x.getPixelForValue(arr.length-1)+8);
}
function noticeBgPlugin(id){return {id:'nb_'+id,beforeDraw(chart){
  const {ctx,chartArea,scales:{x,y}}=chart;if(!x||!y)return;
  ctx.save();
  drawBands(ctx,x,y,NOTICE,'rgba(220,160,0,.04)','rgba(220,160,0,.90)',4);
  drawBands(ctx,x,y,PUNISH,'rgba(255,40,40,.06)','rgba(255,50,50,.95)',6);
  ctx.restore();
}};}

const XS={ticks:{maxTicksLimit:12,color:'#7a8899',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}};
const YS={position:'right',ticks:{color:'#7a8899',font:{size:9}},grid:{color:'rgba(255,255,255,.05)'}};
const BASE_OPT={responsive:true,maintainAspectRatio:false,animation:false,
  plugins:{legend:{display:false},tooltip:{enabled:false}},
  onHover(evt,elems,chart){
    const pts=chart.getElementsAtEventForMode(evt,'index',{intersect:false},false);
    if(!pts.length)return;syncAll(pts[0].index,chart.id);showPanel(pts[0].index);
  }
};

function syncAll(idx,srcId){
  Object.entries(ALL_CHARTS).forEach(([id,c])=>{c._xhairIdx=idx;if(id!==srcId)c.tooltip.setActiveElements([{datasetIndex:0,index:idx}],{x:0,y:0});c.update('none');});
}

let _hpX=0,_hpY=0;
document.addEventListener('mousemove',e=>{_hpX=e.clientX;_hpY=e.clientY;const hp=document.getElementById('hp');if(hp.style.display==='block')_posHP(hp);});
function _posHP(hp){const W=window.innerWidth,H=window.innerHeight,rw=hp.offsetWidth||220,rh=hp.offsetHeight||200;hp.style.left=((_hpX+18+rw>W)?_hpX-rw-8:_hpX+18)+'px';hp.style.top=((_hpY+rh>H)?H-rh-8:_hpY+4)+'px';}
function _fmt(v,u){return v!=null?v+u:'—';}
function _fmtS(v){return v!=null?'O'+SO[v]+' H'+SH[v]+' L'+SL[v]+' C'+SC[v]:'—';}
function showPanel(i){
  const hp=document.getElementById('hp');hp.style.display='block';_posHP(hp);
  const d=DATES[i];document.getElementById('hdate').textContent=d?d.slice(0,4)+'/'+d.slice(4,6)+'/'+d.slice(6):'—';
  document.getElementById('hs').textContent=_fmtS(SC[i]!=null?i:null);
  document.getElementById('hv').textContent=SV[i]!=null?SV[i].toFixed(0)+' 張':'—';
  
  
  const fl=[];if(NOTICE[i])fl.push('<span style="color:#e3b341">⚠ 注意股</span>');if(PUNISH[i])fl.push('<span style="color:#e05050">🔴 處置中</span>');
  document.getElementById('hflag').innerHTML=fl.join(' ');
}

const MA_STYLES=[{label:'MA5',color:'rgba(255,255,255,.85)',width:1},{label:'MA10',color:'rgba(255,220,0,.85)',width:1},{label:'MA20',color:'rgba(255,120,0,.85)',width:1.2},{label:'MA60',color:'rgba(180,100,255,.85)',width:1.5}];

const colors=DATES.map((_,i)=>SC[i]!=null&&SC[i]>=SO[i]?CUP:CDN);
const vcol=DATES.map((_,i)=>SC[i]!=null&&SC[i]>=SO[i]?'rgba(224,80,80,.3)':'rgba(63,185,80,.3)');
const maxV=Math.max(...SV.filter(v=>v!=null&&!isNaN(v)));
const maDsets=[SMA5,SMA10,SMA20,SMA60].map((arr,i)=>{const st=MA_STYLES[i];return {label:st.label,data:arr,type:'line',borderColor:st.color,backgroundColor:'transparent',pointRadius:0,tension:.1,borderWidth:st.width,yAxisID:'y'};});
const c1=new Chart('c1',{type:'bar',data:{labels:DATES,datasets:[
  {label:'vol',data:SV,backgroundColor:vcol,barThickness:6,yAxisID:'yv'},
  {label:'wick',data:DATES.map((_,i)=>SC[i]!=null?[SL[i],SH[i]]:null),backgroundColor:colors,barThickness:1.5,grouped:false,yAxisID:'y'},
  {label:'body',data:DATES.map((_,i)=>SC[i]!=null?[Math.min(SO[i],SC[i]),Math.max(SO[i],SC[i])]:null),backgroundColor:colors,barThickness:6,grouped:false,yAxisID:'y'},
  ...maDsets]},
  options:{...BASE_OPT,layout:{padding:{left:LPAD+58,right:RPAD}},scales:{x:XS,y:{...YS,afterFit(s){s.width=52;},afterDataLimits(s){s.max*=1.02;s.min*=0.98;}},yv:{display:false,min:0,max:maxV*4,grid:{display:false}}}},
  plugins:[noticeBgPlugin('c1'),xhairPlugin]});
ALL_CHARTS['c1']=c1;




document.querySelectorAll('canvas').forEach(c=>{
  c.addEventListener('mouseleave',()=>{document.getElementById('hp').style.display='none';Object.values(ALL_CHARTS).forEach(ch=>{ch._xhairIdx=null;ch.update('none');});});
});
</script>
</body>
</html>
